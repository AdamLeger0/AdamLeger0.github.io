<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NAVCORE • IMPORT/EXPORT STAR SYSTEMS • JSON</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            height: 100vh;
            background: #050505;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.4;
        }
        .top-bar {
            display: flex;
            border-bottom: 2px solid #00ffcc;
            background: #000000aa;
            backdrop-filter: blur(2px);
            font-size: 13px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .top-left {
            display: flex;
            flex-wrap: wrap;
        }
        .top-item {
            padding: 8px 16px;
            border-right: 1px solid #00ffcc;
        }
        .alpha-logo {
            background: #000000aa;
            border-left: 2px solid #00ffcc;
            padding: 6px 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 6px;
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc, 0 0 2px #0ff;
            box-shadow: -2px 0 8px rgba(0,255,204,0.3);
            margin-right: 12px;
            backdrop-filter: blur(4px);
        }
        .alpha-logo span {
            font-size: 14px;
            vertical-align: super;
            letter-spacing: 1px;
            background: #00ffcc22;
            padding: 2px 4px;
            border-radius: 3px;
            margin-left: 6px;
        }
        .main-area {
            flex: 1;
            display: flex;
            padding: 12px;
            gap: 12px;
            overflow: hidden;
        }
        .left-panel {
            width: 440px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            background: #050505;
            border-right: 1px solid #2a4a4a;
            padding-right: 8px;
        }
        .panel {
            border: 1px solid #2a4a4a;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
        }
        .panel-title {
            text-align: center;
            color: #00ffcc;
            font-size: 12px;
            padding: 6px;
            border-bottom: 1px solid #2a4a4a;
            background: #051010;
            letter-spacing: 2px;
        }
        .system-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 6px 0;
            padding: 4px;
            flex-wrap: wrap;
        }
        .sys-btn {
            background: #0a1a1a;
            border: 1px solid #2a6a6a;
            color: #88ffcc;
            font-size: 11px;
            padding: 6px 12px;
            cursor: pointer;
            font-family: monospace;
            text-transform: uppercase;
        }
        .sys-btn.active {
            background: #00aa55;
            color: black;
            border-color: #00ffcc;
        }
        .import-export {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 4px 0 8px 0;
        }
        .ie-btn {
            background: #1a2a2a;
            border: 1px solid #2a6a6a;
            color: #aaffcc;
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
            font-family: monospace;
        }
        .ie-btn:hover {
            background: #00ffcc22;
            border-color: #00ffcc;
        }
        .nav-btn {
            background: transparent;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 8px 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            text-align: left;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.1s;
            margin: 2px 0;
        }
        .nav-btn::before {
            content: '[■]';
            font-size: 8px;
            color: #555;
            margin-right: 4px;
        }
        .nav-btn.star::before {
            content: '[★]';
            color: #ffaa44;
        }
        .nav-btn.planet::before {
            content: '[●]';
            color: #55aaff;
        }
        .nav-btn.moon::before {
            content: '[~]';
            color: #88cc88;
        }
        .nav-btn:hover {
            border-color: #e0e0e0;
            background: rgba(255,255,255,0.08);
        }
        .nav-btn.selected {
            border-color: #00ffcc;
            color: #00ffcc;
            box-shadow: 0 0 8px rgba(0,255,204,0.3);
        }
        .sub-nav {
            margin-left: 28px;
            border-left: 1px dashed #2a6a6a;
            padding-left: 8px;
            display: block;
        }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }
        .canvas-container {
            flex: 1;
            border: 1px solid #2a4a4a;
            background: #050508;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }
        #orbitCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .info-card {
            background: #010a0a;
            border-left: 3px solid #00ffcc;
            padding: 12px;
            font-size: 11px;
        }
        .body-name-large {
            font-size: 20px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 8px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #1a3a3a;
        }
        .info-label {
            color: #88aaff;
        }
        .fact-box {
            margin-top: 10px;
            background: #051515;
            padding: 6px;
            border-left: 2px solid #ffaa44;
            font-size: 10px;
        }
        .footer {
            padding: 6px;
            background: #000000cc;
            border-top: 1px solid #00ffcc;
            text-align: center;
            font-size: 9px;
            color: #668888;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .btn {
            background: transparent;
            border: 1px solid #2a4a4a;
            color: #e0e0e0;
            padding: 4px 10px;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn:hover {
            border-color: #00ffcc;
            color: #00ffcc;
        }
        .btn.active {
            background: #ffcc00;
            color: black;
            border-color: #ffcc00;
        }
        .status {
            background: black;
            border: 1px solid #00ffcc;
            padding: 2px 12px;
            font-size: 11px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pan-buttons {
            display: flex;
            gap: 4px;
            background: #010a0a;
            padding: 4px;
            border-radius: 4px;
            flex-wrap: wrap;
        }
        .pan-btn {
            background: #0a1a1a;
            border: 1px solid #2a6a6a;
            color: #88ffcc;
            font-size: 11px;
            padding: 4px 8px;
            cursor: pointer;
            font-family: monospace;
        }
        .pan-btn:hover {
            background: #00ffcc22;
            border-color: #00ffcc;
        }
        .track-active {
            background: #00aa55;
            color: black;
            border-color: #00ffcc;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; background: #33ff88; }
        }
        .notify {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: #000000cc;
            border-left: 3px solid #00ffcc;
            padding: 6px 12px;
            font-size: 10px;
            font-family: monospace;
            z-index: 2000;
            color: #aaffdd;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #051010;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ffcc44;
        }
    </style>
</head>
<body>
<div class="scanlines"></div>
<div class="top-bar">
    <div class="top-left">
        <div class="top-item">COORD: 55°55'0"N, 37°49'0"E</div>
        <div class="top-item">NAVCORE :: IMPORT/EXPORT</div>
        <div class="top-item">JSON STAR SYSTEMS</div>
    </div>
    <div class="alpha-logo">
        ALPHA<span>v3.3</span>
    </div>
</div>
<div class="main-area">
    <div class="left-panel">
        <div class="panel">
            <div class="panel-title">[STAR SYSTEMS]</div>
            <div class="system-selector" id="systemSelector"></div>
            <div class="import-export">
                <button class="ie-btn" id="exportBtn">[EXPORT SYSTEM]</button>

        </div>
        <div class="panel" style="flex:1;">
            <div class="panel-title">[TELEMETRY]</div>

                <div style="text-align:center; color:#668888;">select a star, planet or moon</div>

    <div class="right-panel">
        <div class="canvas-container">
            <canvas id="orbitCanvas"></canvas>
        </div>
        <div class="controls">
            <div class="btn-row">
                <button class="btn" id="zoom-out">ZOOM -</button>

                <button class="pan-btn" id="pan-up">^ UP</button>
                <button class="pan-btn" id="pan-left"><- LEFT</button>
                <button class="pan-btn" id="pan-right">RIGHT -></button>
                <button class="pan-btn" id="pan-down">DOWN v</button>
                <button class="pan-btn" id="center-star">[STAR]</button>
                <button class="pan-btn" id="center-system">[SYS CTR]</button>
                <button class="pan-btn" id="center-selected">[CENTER]</button>
                <button class="pan-btn" id="reset-pan">[RESET]</button>
                <button class="pan-btn" id="track-toggle">[TRACK]</button>
            </div>
            <div class="btn-row">
                <button class="btn" id="speed-pause">PAUSE</button>
                <button class="btn active" id="speed-1x">1x</button>
                <button class="btn" id="speed-5x">5x</button>
                <button class="btn" id="speed-10x">10x</button>
                <button class="btn" id="speed-20x">20x</button>
            </div>
            <div class="status" id="speedLabel">SPEED: 1x</div>
            <div class="status" id="zoomLabel">ZOOM: 1.00x</div>
            <div class="status" id="trackStatus">TRACK: OFF</div>
        </div>
    </div>
</div>
<div class="footer">
    <span>NAVCORE :: EXPORT/IMPORT SYSTEMS AS JSON | SYSTEM DATA PERSISTENT</span>
</div>
<div id="notifyMsg" class="notify"></div>

<script>
    // --------------------------------------------------------------
    // STAR SYSTEMS DATA (built-in + imported will be added)
    // --------------------------------------------------------------
    const defaultStarSystems = {
        "Sol": {
            name: "Sol System",
            stars: [
                {
                    name: "Sol",

                        { name: "Mercury", visualRadius: 45, speed: 0.0210, color: "#b0a8a0", size: 3.0, moons: [], periodDays: 88,
                          gravity: "3.7 m/s²", atmosphere: "negligible", temperature: "167C / -93C", dayLength: "58.6d", fact: "Fastest orbit." },

                        { name: "Earth",   visualRadius: 100, speed: 0.0100, color: "#3a86ff", size: 4.0, moons: [{name:"Luna", desc:"Large satellite"}], periodDays: 365,
                          gravity: "9.81 m/s²", atmosphere: "N2, O2", temperature: "14C", dayLength: "24h", fact: "Our home." },
                        { name: "Mars",    visualRadius: 140, speed: 0.0080, color: "#e35f21", size: 3.8, moons: [{name:"Phobos", desc:"Irregular"},{name:"Deimos", desc:"Small"}], periodDays: 687,
                          gravity: "3.71 m/s²", atmosphere: "thin CO2", temperature: "-65C to 20C", dayLength: "24h 37m", fact: "Olympus Mons." },
                        { name: "Jupiter", visualRadius: 260, speed: 0.0042, color: "#d8a27a", size: 7.5, moons: [{name:"Io", desc:"Volcanic"},{name:"Europa", desc:"Ocean"},{name:"Ganymede", desc:"Largest"},{name:"Callisto", desc:"Cratered"}], periodDays: 4333,
                          gravity: "24.79 m/s²", atmosphere: "H2, He", temperature: "-110C", dayLength: "9h 56m", fact: "Great Red Spot." },
                        { name: "Saturn",  visualRadius: 360, speed: 0.0030, color: "#e8cfb0", size: 6.8, moons: [{name:"Titan", desc:"Methane lakes"},{name:"Rhea", desc:"Icy"},{name:"Dione", desc:"Ice crust"},{name:"Enceladus", desc:"Plumes"}], periodDays: 10759,
                          gravity: "10.44 m/s²", atmosphere: "H2, He", temperature: "-178C", dayLength: "10h 33m", fact: "Ring system." },
                        { name: "Uranus",  visualRadius: 460, speed: 0.0021, color: "#b0e0e6", size: 5.5, moons: [{name:"Titania", desc:"Largest"},{name:"Oberon", desc:"Cratered"},{name:"Umbriel", desc:"Dark"}], periodDays: 30687,
                          gravity: "8.69 m/s²", atmosphere: "H2, He, CH4", temperature: "-224C", dayLength: "17h 14m", fact: "Sideways rotation." },
                        { name: "Neptune", visualRadius: 550, speed: 0.0017, color: "#4a6a8a", size: 5.5, moons: [{name:"Triton", desc:"Geysers"},{name:"Nereid", desc:"Eccentric"}], periodDays: 60190,
                          gravity: "11.15 m/s²", atmosphere: "H2, He, CH4", temperature: "-214C", dayLength: "16h 6m", fact: "Strongest winds." }
                    ]
                }
            ],
            asteroidBelt: true
        },
        "Alpha Centauri": {
            name: "Alpha Centauri System",
            stars: [
                {
                    name: "Alpha Centauri A",
                    type: "G2V Yellow Dwarf",
                    mass: "1.1 M☉",
                    temperature: "5790 K",
                    radius: 16,
                    color: "#ffcc88",
                    isPrimary: true,
                    orbitalRadius: 0,
                    orbitalSpeed: 0,
                    planets: [
                        { name: "Aether", visualRadius: 85, speed: 0.011, color: "#aa8866", size: 3.8, moons: [], periodDays: 310,
                          gravity: "8.9 m/s²", atmosphere: "thin N2", temperature: "22C", dayLength: "28h", fact: "Potentially habitable." }
                    ]
                },
                {
                    name: "Alpha Centauri B",
                    type: "K1V Orange Dwarf",
                    mass: "0.9 M☉",
                    temperature: "5260 K",
                    radius: 13,
                    color: "#ffaa66",
                    isPrimary: false,
                    orbitalRadius: 220,
                    orbitalSpeed: 0.0035,
                    planets: [
                        { name: "Vulcan", visualRadius: 140, speed: 0.0075, color: "#cc6644", size: 4.5, moons: [{name:"Pyros", desc:"Volcanic"}], periodDays: 890,
                          gravity: "12.1 m/s²", atmosphere: "dense CO2", temperature: "340C", dayLength: "14h", fact: "Extreme greenhouse." }
                    ]
                },
                {
                    name: "Proxima Centauri",
                    type: "M5.5Ve Red Dwarf",
                    mass: "0.12 M☉",
                    temperature: "3040 K",
                    radius: 9,
                    color: "#ff8866",
                    isPrimary: false,
                    orbitalRadius: 380,
                    orbitalSpeed: 0.0022,
                    planets: [
                        { name: "Proxima b", visualRadius: 65, speed: 0.014, color: "#aa8866", size: 2.5, moons: [], periodDays: 11,
                          gravity: "7.5 m/s²", atmosphere: "unknown", temperature: "-39C", dayLength: "?h", fact: "Earth-sized, in habitable zone." }
                    ]
                }
            ],
            asteroidBelt: false
        }
    };
    
    let starSystems = JSON.parse(JSON.stringify(defaultStarSystems));  // mutable copy
    let currentSystemId = "Sol";
    let currentSystem = starSystems[currentSystemId];
    let currentStars = currentSystem.stars;
    let selectedBody = null;
    
    // Helper: show notification
    function showNotify(msg, isError = false) {
        const notify = document.getElementById('notifyMsg');
        notify.style.backgroundColor = isError ? "#330000" : "#000000cc";
        notify.style.borderLeftColor = isError ? "#ff6666" : "#00ffcc";
        notify.style.color = isError ? "#ffaaaa" : "#aaffdd";
        notify.innerText = msg;
        notify.style.opacity = "1";
        setTimeout(() => { notify.style.opacity = "0"; }, 3000);
    }
    
    // Initialize angles
    function initAngles() {
        for (let star of currentStars) {
            if (!star.isPrimary) star.angle = Math.random() * 2 * Math.PI;
            for (let planet of star.planets) {
                planet.angle = Math.random() * 2 * Math.PI;
                for (let moon of (planet.moons || [])) {
                    moon.angle = Math.random() * 2 * Math.PI;
                }
            }
        }
    }
    
    // Asteroid belt
    let asteroids = [];
    function generateAsteroidBelt() {
        if (!currentSystem.asteroidBelt) {
            asteroids = [];
            return;
        }
        const ASTEROID_COUNT = 1500;
        const BELT_INNER = 175;
        const BELT_OUTER = 210;
        const BELT_ANGULAR_SPEED = 0.0022;
        asteroids = [];
        for (let i = 0; i < ASTEROID_COUNT; i++) {
            const radius = BELT_INNER + Math.random() * (BELT_OUTER - BELT_INNER);
            const angle = Math.random() * 2 * Math.PI;
            const size = 1.0 + Math.random() * 1.5;
            const speedVar = 0.0002 * (Math.random() - 0.5);
            asteroids.push({ radius, angle, size, speed: BELT_ANGULAR_SPEED + speedVar });
        }
    }
    
    function updateOrbits(dt) {
        if (simulationPaused) return;
        for (let star of currentStars) {
            if (!star.isPrimary && star.orbitalSpeed) {
                star.angle = (star.angle || 0) + star.orbitalSpeed * dt;
                while (star.angle > 2*Math.PI) star.angle -= 2*Math.PI;
            }
            for (let planet of star.planets) {
                planet.angle = (planet.angle || 0) + planet.speed * dt;
                while (planet.angle > 2*Math.PI) planet.angle -= 2*Math.PI;
                for (let moon of (planet.moons || [])) {
                    moon.angle = (moon.angle || 0) + (planet.speed * 1.5) * dt;
                    while (moon.angle > 2*Math.PI) moon.angle -= 2*Math.PI;
                }
            }
        }
        if (currentSystem.asteroidBelt) {
            for (let a of asteroids) {
                a.angle += a.speed * dt;
                while (a.angle > 2*Math.PI) a.angle -= 2*Math.PI;
            }
        }
    }
    
    // Drawing and navigation (same as before, with barycenter)
    let ctx, width, height;
    let zoomLevel = 1.0, panX = 0, panY = 0;
    let trackingMode = false;
    let simulationPaused = false;
    let timeScale = 1.0;
    let lastFrame = 0;
    
    function getStarWorldPosition(star) {
        if (star.isPrimary) return { x: 0, y: 0 };
        const angle = star.angle || 0;
        const r = star.orbitalRadius;
        return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
    }
    
    function getWorldPosition(body) {
        if (body.type === 'star') {
            return getStarWorldPosition(body.data);
        } else if (body.type === 'planet') {
            const star = body.parentStar;
            const starPos = getStarWorldPosition(star);
            const angle = body.data.angle || 0;
            const r = body.data.visualRadius;
            return { x: starPos.x + Math.cos(angle) * r, y: starPos.y + Math.sin(angle) * r };
        } else if (body.type === 'moon') {
            const planet = body.parent;
            const star = body.parentStar;
            const starPos = getStarWorldPosition(star);
            const planetAngle = planet.angle || 0;
            const planetR = planet.visualRadius;
            const planetPos = { x: starPos.x + Math.cos(planetAngle) * planetR, y: starPos.y + Math.sin(planetAngle) * planetR };
            const moonAngle = body.data.angle || 0;
            const moonOffset = 12;
            return { x: planetPos.x + Math.cos(moonAngle) * moonOffset, y: planetPos.y + Math.sin(moonAngle) * moonOffset };
        }
        return { x: 0, y: 0 };
    }
    
    function getBarycenter() {
        let sumX = 0, sumY = 0;
        let count = 0;
        for (let star of currentStars) {
            const pos = getStarWorldPosition(star);
            sumX += pos.x;
            sumY += pos.y;
            count++;
        }
        if (count === 0) return { x: 0, y: 0 };
        return { x: sumX / count, y: sumY / count };
    }
    
    function centerOnBarycenter() {
        if (trackingMode) disableTracking();
        const bary = getBarycenter();
        panX = -bary.x * zoomLevel;
        panY = -bary.y * zoomLevel;
        draw();
    }
    function centerOnPrimaryStar() {
        if (trackingMode) disableTracking();
        const primary = currentStars.find(s => s.isPrimary);
        if (primary) {
            const pos = getStarWorldPosition(primary);
            panX = -pos.x * zoomLevel;
            panY = -pos.y * zoomLevel;
        } else { panX = 0; panY = 0; }
        draw();
    }
    function centerOnSelected() {
        if (!selectedBody) return;
        if (trackingMode) disableTracking();
        const pos = getWorldPosition(selectedBody);
        panX = -pos.x * zoomLevel;
        panY = -pos.y * zoomLevel;
        draw();
    }
    function updateTracking() {
        if (!trackingMode || !selectedBody) return;
        const pos = getWorldPosition(selectedBody);
        panX = -pos.x * zoomLevel;
        panY = -pos.y * zoomLevel;
    }
    function enableTracking() { trackingMode = true; document.getElementById('track-toggle').classList.add('track-active'); document.getElementById('trackStatus').innerText = "TRACK: ON"; centerOnSelected(); }
    function disableTracking() { trackingMode = false; document.getElementById('track-toggle').classList.remove('track-active'); document.getElementById('trackStatus').innerText = "TRACK: OFF"; }
    function toggleTracking() { trackingMode ? disableTracking() : enableTracking(); }
    function setZoom(delta) { if(trackingMode) disableTracking(); zoomLevel = Math.min(5, Math.max(0.25, zoomLevel+delta)); document.getElementById('zoomLabel').innerText = `ZOOM: ${zoomLevel.toFixed(2)}x`; draw(); }
    function resetZoom() { if(trackingMode) disableTracking(); zoomLevel=1.0; document.getElementById('zoomLabel').innerText='ZOOM: 1.00x'; draw(); }
    function pan(dx,dy) { if(trackingMode) disableTracking(); panX+=dx; panY+=dy; draw(); }
    function resetPan() { if(trackingMode) disableTracking(); panX=0; panY=0; draw(); }
    function setSpeed(mult,btnId) { timeScale=mult; simulationPaused=(mult===0); document.getElementById('speedLabel').innerText=simulationPaused?"SPEED: PAUSED":`SPEED: ${mult}x`; ['speed-pause','speed-1x','speed-5x','speed-10x','speed-20x'].forEach(id=>{let b=document.getElementById(id);if(b)b.classList.remove('active');}); if(btnId) document.getElementById(btnId).classList.add('active'); }
    
    function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.translate(width/2 + panX, height/2 + panY);
        ctx.scale(zoomLevel, zoomLevel);
        for (let star of currentStars) {
            const starPos = getStarWorldPosition(star);
            for (let planet of star.planets) {
                ctx.beginPath();
                ctx.arc(starPos.x, starPos.y, planet.visualRadius, 0, 2*Math.PI);
                ctx.strokeStyle = "rgba(80,180,180,0.2)";
                ctx.setLineDash([4,6]);
                ctx.stroke();
            }
        }
        ctx.setLineDash([]);
        if (currentSystem.asteroidBelt) {
            for (let a of asteroids) {
                const x = Math.cos(a.angle) * a.radius;
                const y = Math.sin(a.angle) * a.radius;
                ctx.fillStyle = "#887755";
                ctx.fillRect(x - a.size/2, y - a.size/2, a.size, a.size);
            }
        }
        for (let star of currentStars) {
            const pos = getStarWorldPosition(star);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, star.radius, 0, 2*Math.PI);
            ctx.fillStyle = star.color;
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0;
            if (selectedBody && selectedBody.type === 'star' && selectedBody.data.name === star.name) {
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, star.radius+3, 0, 2*Math.PI);
                ctx.strokeStyle = "#ffcc55";
                ctx.lineWidth = 2;
                ctx.setLineDash([3,3]);
                ctx.stroke();
            }
        }
        for (let star of currentStars) {
            const starPos = getStarWorldPosition(star);
            for (let planet of star.planets) {
                const angle = planet.angle || 0;
                const px = starPos.x + Math.cos(angle) * planet.visualRadius;
                const py = starPos.y + Math.sin(angle) * planet.visualRadius;
                ctx.beginPath();
                ctx.arc(px, py, planet.size, 0, 2*Math.PI);
                ctx.fillStyle = planet.color;
                ctx.fill();
                if (selectedBody && selectedBody.type === 'planet' && selectedBody.data.name === planet.name) {
                    ctx.beginPath();
                    ctx.arc(px, py, planet.size+2, 0, 2*Math.PI);
                    ctx.strokeStyle = "#ffcc55";
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
                for (let moon of (planet.moons || [])) {
                    const moonAngle = moon.angle || 0;
                    const mx = px + Math.cos(moonAngle) * 12;
                    const my = py + Math.sin(moonAngle) * 12;
                    ctx.beginPath();
                    ctx.arc(mx, my, 2.5, 0, 2*Math.PI);
                    ctx.fillStyle = "#ccccaa";
                    ctx.fill();
                }
            }
        }
        ctx.restore();
        ctx.font = "9px monospace";
        ctx.fillStyle = trackingMode ? "#33ff88" : "#446666";
        ctx.fillText(`TRACK: ${trackingMode ? "ACTIVE" : "OFF"}`, 8, 40);
        ctx.fillStyle = "#446666";
        ctx.fillText(`PAN: (${panX.toFixed(0)}, ${panY.toFixed(0)})`, 8, 28);
        ctx.fillStyle = "#668888";
        ctx.fillText(`SYSTEM: ${currentSystemId}`, 8, 52);
    }
    
    // UI tree building
    const planetTreeDiv = document.getElementById('planetTree');
    const infoPanelDiv = document.getElementById('infoPanel');
    
    function buildTree() {
        planetTreeDiv.innerHTML = '';
        for (let star of currentStars) {
            const starBtn = document.createElement('div');
            starBtn.className = `nav-btn star ${(selectedBody && selectedBody.type === 'star' && selectedBody.data.name === star.name) ? 'selected' : ''}`;
            starBtn.innerHTML = `<span style="flex:1;">[★] ${star.name}</span><span style="color:#ffaa44;">${star.type}</span>`;
            starBtn.onclick = () => selectBody({ type: 'star', data: star });
            planetTreeDiv.appendChild(starBtn);
            const planetContainer = document.createElement('div');
            planetContainer.className = 'sub-nav';
            for (let planet of star.planets) {
                const planetBtn = document.createElement('div');
                planetBtn.className = `nav-btn planet ${(selectedBody && selectedBody.type === 'planet' && selectedBody.data.name === planet.name) ? 'selected' : ''}`;
                planetBtn.innerHTML = `<span style="flex:1;">[●] ${planet.name}</span><span style="color:#88aaff;">${planet.visualRadius} AU</span>`;
                planetBtn.onclick = () => selectBody({ type: 'planet', data: planet, parentStar: star });
                planetContainer.appendChild(planetBtn);
                const moonContainer = document.createElement('div');
                moonContainer.className = 'sub-nav';
                for (let moon of (planet.moons || [])) {
                    const moonBtn = document.createElement('div');
                    moonBtn.className = `nav-btn moon ${(selectedBody && selectedBody.type === 'moon' && selectedBody.data.name === moon.name) ? 'selected' : ''}`;
                    moonBtn.innerHTML = `<span style="flex:1;">[~] ${moon.name}</span><span style="font-size:9px;">${moon.desc.substring(0,20)}</span>`;
                    moonBtn.onclick = () => selectBody({ type: 'moon', data: moon, parent: planet, parentStar: star });
                    moonContainer.appendChild(moonBtn);
                }
                planetContainer.appendChild(moonContainer);
            }
            planetTreeDiv.appendChild(planetContainer);
        }
    }
    
    function selectBody(body) {
        if (trackingMode) disableTracking();
        selectedBody = body;
        buildTree();
        updateInfoPanel();
        draw();
    }
    
    function updateInfoPanel() {
        if (!selectedBody) {
            infoPanelDiv.innerHTML = '<div style="text-align:center; color:#668888;">select a star, planet or moon</div>';
            return;
        }
        if (selectedBody.type === 'star') {
            const s = selectedBody.data;
            infoPanelDiv.innerHTML = `<div class="info-card"><div class="body-name-large">[STAR] ${s.name}</div><div class="info-row"><span class="info-label">TYPE</span><span>${s.type}</span></div><div class="info-row"><span class="info-label">MASS</span><span>${s.mass}</span></div><div class="info-row"><span class="info-label">TEMPERATURE</span><span>${s.temperature}</span></div><div class="fact-box">[FACT] Primary energy source.</div></div>`;
        } else if (selectedBody.type === 'planet') {
            const p = selectedBody.data;
            const moonsStr = (p.moons || []).map(m=>m.name).join(', ') || 'None';
            infoPanelDiv.innerHTML = `<div class="info-card"><div class="body-name-large">[PLANET] ${p.name}</div><div class="info-row"><span class="info-label">ORBIT RADIUS</span><span>${p.visualRadius} AU</span></div><div class="info-row"><span class="info-label">PERIOD</span><span>${p.periodDays} days</span></div><div class="info-row"><span class="info-label">GRAVITY</span><span>${p.gravity}</span></div><div class="info-row"><span class="info-label">ATMOSPHERE</span><span>${p.atmosphere}</span></div><div class="info-row"><span class="info-label">TEMP</span><span>${p.temperature}</span></div><div class="info-row"><span class="info-label">DAY LENGTH</span><span>${p.dayLength}</span></div><div class="info-row"><span class="info-label">MOONS</span><span>${moonsStr}</span></div><div class="fact-box">${p.fact}</div></div>`;
        } else if (selectedBody.type === 'moon') {
            const m = selectedBody.data;
            infoPanelDiv.innerHTML = `<div class="info-card"><div class="body-name-large">[MOON] ${m.name}</div><div class="info-row"><span class="info-label">DESCRIPTION</span><span>${m.desc}</span></div><div class="fact-box">Natural satellite.</div></div>`;
        }
    }
    
    function switchSystem(sysId) {
        if (trackingMode) disableTracking();
        if (!starSystems[sysId]) { showNotify(`System "${sysId}" not found.`, true); return; }
        currentSystemId = sysId;
        currentSystem = starSystems[currentSystemId];
        currentStars = currentSystem.stars;
        initAngles();
        generateAsteroidBelt();
        panX = 0; panY = 0;
        zoomLevel = 1.0;
        document.getElementById('zoomLabel').innerText = 'ZOOM: 1.00x';
        selectedBody = currentStars.length > 0 ? { type: 'star', data: currentStars[0] } : null;
        buildTree();
        updateInfoPanel();
        draw();
        document.querySelectorAll('.sys-btn').forEach(btn => { btn.classList.remove('active'); if (btn.innerText === sysId) btn.classList.add('active'); });
    }
    
    function renderSystemSelector() {
        const selector = document.getElementById('systemSelector');
        selector.innerHTML = '';
        for (let sysId in starSystems) {
            const btn = document.createElement('button');
            btn.className = `sys-btn ${currentSystemId === sysId ? 'active' : ''}`;
            btn.innerText = sysId;
            btn.onclick = () => switchSystem(sysId);
            selector.appendChild(btn);
        }
    }
    
    // ----- EXPORT/IMPORT -----
    function exportCurrentSystem() {
        const systemData = starSystems[currentSystemId];
        const exportObj = { [currentSystemId]: systemData };
        const dataStr = JSON.stringify(exportObj, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentSystemId}_system.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showNotify(`Exported "${currentSystemId}" to JSON.`);
    }
    
    function importSystemFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (typeof imported !== 'object' || imported === null) throw new Error("Invalid JSON");
                let addedCount = 0;
                for (let sysId in imported) {
                    const sysData = imported[sysId];
                    if (!sysData.stars || !Array.isArray(sysData.stars)) {
                        showNotify(`System "${sysId}" missing 'stars' array. Skipped.`, true);
                        continue;
                    }
                    starSystems[sysId] = sysData;
                    addedCount++;
                }
                if (addedCount > 0) {
                    renderSystemSelector();
                    if (!starSystems[currentSystemId]) {
                        const firstKey = Object.keys(starSystems)[0];
                        if (firstKey) switchSystem(firstKey);
                        else currentSystemId = null;
                    } else {
                        switchSystem(currentSystemId);
                    }
                    showNotify(`Imported ${addedCount} system(s).`);
                } else {
                    showNotify("No valid systems imported.", true);
                }
            } catch(err) {
                showNotify(`Import error: ${err.message}`, true);
            }
        };
        reader.onerror = () => showNotify("File read error.", true);
        reader.readAsText(file);
    }
    
    // Animation
    function animate(now) {
        requestAnimationFrame(animate);
        if (!lastFrame) { lastFrame = now; draw(); return; }
        let dt = Math.min(0.033, (now - lastFrame) / 1000);
        if (dt > 0.001) {
            updateOrbits(dt);
            if (trackingMode) updateTracking();
            draw();
        }
        lastFrame = now;
    }
    
    // Event binding
    const canvas = document.getElementById('orbitCanvas');
    ctx = canvas.getContext('2d');
    const container = document.querySelector('.canvas-container');
    function resizeCanvas() { width = container.clientWidth; height = container.clientHeight; canvas.width = width; canvas.height = height; draw(); }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    document.getElementById('zoom-in').onclick = () => setZoom(0.2);
    document.getElementById('zoom-out').onclick = () => setZoom(-0.2);
    document.getElementById('zoom-reset').onclick = resetZoom;
    document.getElementById('pan-up').onclick = () => pan(0, -30);
    document.getElementById('pan-down').onclick = () => pan(0, 30);
    document.getElementById('pan-left').onclick = () => pan(-30, 0);
    document.getElementById('pan-right').onclick = () => pan(30, 0);
    document.getElementById('center-star').onclick = centerOnPrimaryStar;
    document.getElementById('center-system').onclick = centerOnBarycenter;
    document.getElementById('center-selected').onclick = () => { if(trackingMode) disableTracking(); centerOnSelected(); };
    document.getElementById('reset-pan').onclick = resetPan;
    document.getElementById('track-toggle').onclick = toggleTracking;
    document.getElementById('speed-pause').onclick = () => setSpeed(0, 'speed-pause');
    document.getElementById('speed-1x').onclick = () => setSpeed(1, 'speed-1x');
    document.getElementById('speed-5x').onclick = () => setSpeed(5, 'speed-5x');
    document.getElementById('speed-10x').onclick = () => setSpeed(10, 'speed-10x');
    document.getElementById('speed-20x').onclick = () => setSpeed(20, 'speed-20x');
    canvas.addEventListener('wheel', e => { e.preventDefault(); if(trackingMode) disableTracking(); setZoom(e.deltaY > 0 ? -0.1 : 0.1); });
    
    document.getElementById('exportBtn').onclick = exportCurrentSystem;
    const fileInput = document.getElementById('importFileInput');
    document.getElementById('importBtn').onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if (e.target.files.length) importSystemFromFile(e.target.files[0]); fileInput.value = ''; };
    
    renderSystemSelector();
    initAngles();
    generateAsteroidBelt();
    selectedBody = currentStars.length > 0 ? { type: 'star', data: currentStars[0] } : null;
    buildTree();
    updateInfoPanel();
    draw();
    requestAnimationFrame(animate);
</script>
</body>
</html>
