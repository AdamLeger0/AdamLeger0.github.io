<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EARTH-MARS CYCLER OS // MAIN</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #e0e0e0;
            --accent-cyan: #00ffcc;
            --accent-blue: #0088ff;
            --accent-red: #ff3333;
            --accent-orange: #ffaa00;
            --accent-green: #33ff33;
            --panel-bg: #0a0a0f;
            --border-dim: #333333;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* CRT Overlay Effects */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 1000;
            pointer-events: none;
        }
        
        .flicker {
            animation: crt-flicker 0.15s infinite;
            width: 100%; height: 100%; display: flex; flex-direction: column;
            padding: 10px; box-sizing: border-box;
        }

        @keyframes crt-flicker {
            0% { opacity: 0.98; } 50% { opacity: 0.95; } 100% { opacity: 0.99; }
        }

        /* Hardware Power Overlay */
        #power-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: none;
            justify-content: center; align-items: center;
        }
        #power-overlay.active { display: flex; }
        
        .emergency-light {
            width: 60px; height: 60px; border-radius: 50%;
            background: transparent; border: 2px solid #220000;
            cursor: pointer; outline: none;
            animation: emergencyPulse 7s infinite;
            box-shadow: inset 0 0 10px #000;
            transition: transform 0.1s;
        }
        .emergency-light:active { transform: scale(0.95); }

        /* 7s loop: 2s pulse (0-28%), 5s pause (28%-100%) */
        @keyframes emergencyPulse {
            0%, 28%, 100% { background: #0a0000; box-shadow: inset 0 0 10px #000; border-color: #220000; }
            14% { background: rgba(255, 0, 0, 0.15); box-shadow: 0 0 30px rgba(255, 0, 0, 0.4), inset 0 0 20px rgba(255, 0, 0, 0.8); border-color: #ff3333; }
        }

        /* Layout Architecture */
        .mfd-container {
            width: 100%; height: 100%;
            border: 2px solid var(--border-dim);
            display: flex; flex-direction: column;
            background: var(--bg-color);
            box-shadow: inset 0 0 100px rgba(0, 255, 204, 0.05);
        }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; border-bottom: 2px solid var(--border-dim);
            font-size: 14px; font-weight: bold; letter-spacing: 2px;
            background: #000;
        }
        .header-left { color: var(--accent-cyan); display: flex; gap: 20px; }
        .header-left .title { border: 1px solid var(--accent-cyan); padding: 2px 10px; transition: color 0.2s;}
        .header-right { color: var(--text-main); font-size: 12px; }

        /* Main Display Area */
        .main-display { display: flex; flex: 1; overflow: hidden; }

        /* Sidebars */
        .sidebar {
            width: 120px; display: flex; flex-direction: column; gap: 10px;
            padding: 20px 10px; background: #000; border-right: 2px solid var(--border-dim);
        }
        .sidebar.right { border-right: none; border-left: 2px solid var(--border-dim); align-items: flex-end;}

        .nav-btn {
            background: transparent; color: var(--text-main);
            border: 1px solid var(--border-dim); padding: 8px 10px;
            font-family: inherit; font-size: 12px; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; text-align: center; width: 100%;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.1s;
        }
        .nav-btn::before { content: '■'; font-size: 8px; color: var(--border-dim); }
        .nav-btn:hover { border-color: var(--text-main); background: rgba(255,255,255,0.1); }
        .nav-btn:active { background: var(--text-main); color: #000; }
        .sidebar.right .nav-btn { flex-direction: row-reverse; }

        .spacer { flex: 1; }

        /* Center Grid & Boot Screen */
        .center-console {
            flex: 1; position: relative; background: var(--panel-bg);
            padding: 30px; overflow-y: auto; align-content: flex-start;
        }

        #boot-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 50; display: flex; flex-direction: column;
            padding: 40px; box-sizing: border-box; font-size: 14px; line-height: 1.5;
            color: var(--accent-cyan);
        }
        
        .cursor { display: inline-block; width: 8px; height: 15px; background: var(--accent-cyan); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 5px;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #file-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; grid-auto-rows: 80px;}

        /* File Modules */
        .module {
            background: #000; border: 1px solid var(--border-dim);
            height: 100%; display: flex; cursor: pointer;
            transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
            position: relative; text-decoration: none; color: inherit;
        }
        .module:hover { border-color: var(--text-main); transform: scale(1.02); z-index: 10; box-shadow: 0 0 15px rgba(255,255,255,0.1);}
        
        .mod-status { width: 15px; height: 100%; border-right: 1px solid var(--border-dim); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 5px 0; box-sizing: border-box;}
        .mod-status span { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 8px; color: var(--border-dim); letter-spacing: 2px;}
        .mod-led { width: 80%; height: 20px; background: var(--accent-cyan); margin-bottom: 5px; }
        
        .mod-content { flex: 1; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;}
        .mod-title { font-weight: bold; font-size: 12px; color: var(--text-main); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .mod-data { font-size: 9px; color: var(--border-dim); display: flex; flex-direction: column; gap: 2px;}
        
        /* Theming for different file types */
        .module.sys .mod-led { background: var(--text-main); }
        .module.sys .mod-title { color: var(--text-main); }
        
        .module.app .mod-led { background: var(--accent-cyan); }
        .module.app .mod-title { color: var(--accent-cyan); }
        
        .module.offline { opacity: 0.5; border-style: dashed; cursor: not-allowed; }
        .module.offline .mod-led { background: var(--border-dim); }
        .module.offline .mod-title { color: #888; }
        .module.offline:hover { transform: none; border-color: var(--border-dim); box-shadow: none;}

        .module.locked .mod-led { background: var(--accent-orange); }
        .module.locked .mod-title { color: var(--accent-orange); }
        .module.locked { cursor: not-allowed; border-color: #554400; }
        .module.locked:hover { transform: none; box-shadow: none; border-color: var(--accent-orange); }

        .module.corrupted { border-color: #440000; animation: slight-glitch 2s infinite; cursor: not-allowed;}
        .module.corrupted .mod-led { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); animation: rapid-blink 0.1s infinite; }
        .module.corrupted .mod-title { color: var(--accent-red); text-shadow: 0 0 5px var(--accent-red); letter-spacing: 1px; }
        .module.corrupted .mod-data { color: #883333; }
        .module.corrupted:hover { transform: scale(1.02) rotate(-1deg); border-color: var(--accent-red); box-shadow: 0 0 10px rgba(255,0,0,0.3);}

        @keyframes rapid-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes slight-glitch { 0%, 100% { transform: translateX(0); } 98% { transform: translateX(1px); } 99% { transform: translateX(-1px); } }

        /* Footer */
        .footer {
            display: flex; gap: 10px; padding: 10px 20px; border-top: 2px solid var(--border-dim);
            background: #000; align-items: center; justify-content: center;
        }
        .num-btn {
            background: transparent; border: 1px solid var(--border-dim); color: var(--text-main);
            width: 40px; height: 30px; display: flex; justify-content: center; align-items: center;
            font-family: inherit; font-size: 12px; cursor: pointer; border-bottom: 4px solid var(--border-dim);
            transition: all 0.1s;
        }
        .num-btn:hover { background: rgba(255,255,255,0.1); }
        .num-btn:active { border-bottom: 1px solid var(--border-dim); transform: translateY(3px); background: var(--text-main); color:#000; }
        .num-btn.active { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); border-bottom: 2px solid #00aa88; transform: translateY(2px); }

        .sys-status-bar { flex: 1; height: 4px; background: var(--border-dim); display: flex; margin-left: 20px;}
        .sys-status-bar .fill { width: 35%; height: 100%; background: var(--accent-cyan); border-right: 2px solid #000; transition: width 0.3s;}
        .sys-status-bar .fill.err { width: 10%; background: var(--accent-red); }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    
    <div id="power-overlay">
        <button class="emergency-light" id="btn-restart" title="EMERGENCY RESTART"></button>
    </div>

    <div class="flicker">
        <div class="mfd-container">
            
            <div class="header">
                <div class="header-left">
                    <div class="title" id="sys-title">MAIN.DIRECTORY</div>
                    <div style="color: var(--border-dim);" id="sys-path">ECMS_OS//DATA.DISPLAY//ROOT</div>
                </div>
                <div class="header-right">EARTH-MARS.CYCLER.SYSTEM_OS &nbsp;&nbsp; V0.4.1</div>
            </div>

            <div class="main-display">
                
                <div class="sidebar left">
                    <input type="file" id="dir-picker" webkitdirectory directory multiple style="display:none;">
                    <button class="nav-btn" id="btn-mdir" title="Mount Local Folder (Dev Tool)">MDIR</button>
                    <button class="nav-btn" style="margin-bottom: 20px;" onclick="sysNotify('NO PREVIOUS DIRECTORY FOUND')">BACK</button>
                    
                    <button class="nav-btn" onclick="sysNotify('AWAITING TARGET SELECTION')">SEL</button>
                    <button class="nav-btn" onclick="sysNotify('JOG Y+')">UP</button>
                    <button class="nav-btn" onclick="sysNotify('JOG Y-')">DWN</button>
                    <button class="nav-btn" onclick="sysNotify('JOG X-')">LEFT</button>
                    <button class="nav-btn" style="margin-bottom: 20px;" onclick="sysNotify('JOG X+')">RIGHT</button>
                    
                    <button class="nav-btn" onclick="sysNotify('CONSOLE LINK OFFLINE')">CONS</button>
                    <div class="spacer"></div>
                    <button class="nav-btn" onclick="sysNotify('ACCESSING SYSTEM METRICS...')">SYS</button>
                    <button class="nav-btn" onclick="sysNotify('KEYBOARD INPUT DISABLED')">KBRD</button>
                </div>

                <div class="center-console">
                    <div id="boot-screen">
                        <div id="boot-text"></div>
                    </div>
                    
                    <div id="file-grid">
                        </div>
                </div>

                <div class="sidebar right">
                    <button class="nav-btn" onclick="sysNotify('DISPLAY SETTINGS LOCKED')">DISP</button>
                    <button class="nav-btn" onclick="sysNotify('NO TARGET ACQUIRED')">TGT</button>
                    <button class="nav-btn" style="margin-bottom: 20px;" onclick="sysNotify('NUM PAD ENGAGED')">NUM</button>
                    <button class="nav-btn" onclick="sysNotify('CYCLING ACTIVE DATA ARRAYS')">CYCL</button>
                    <div class="spacer"></div>
                    <button class="nav-btn" onclick="changePageOffset(1)">PG +</button>
                    <button class="nav-btn" style="margin-bottom: 20px;" onclick="changePageOffset(-1)">PG -</button>
                    <button class="nav-btn" onclick="sysNotify('DIAGNOSTIC TRACE... CLEAR')">DIAG</button>
                    <button class="nav-btn" onclick="sysNotify('INITIATING LOCAL TEST')">TEST</button>
                    <button class="nav-btn" id="btn-pwr" style="color: var(--accent-red); border-color: var(--accent-red);">PWR</button>
                </div>

            </div>

            <div class="footer">
                <button class="num-btn" onclick="generatePage(1)">1</button>
                <button class="num-btn" onclick="generatePage(2)">2</button>
                <button class="num-btn" onclick="generatePage(3)">3</button>
                <button class="num-btn" onclick="generatePage(4)">4</button>
                <button class="num-btn" onclick="generatePage(5)">5</button>
                <button class="num-btn" onclick="generatePage(6)">6</button>
                <button class="num-btn" onclick="generatePage(7)">7</button>
                <button class="num-btn" onclick="generatePage(8)">8</button>
                <button class="num-btn" onclick="generatePage(9)">9</button>
                <div class="sys-status-bar">
                    <div class="fill" id="mem-fill"></div>
                    <div class="fill err" id="err-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // System Data
        const MAX_PAGES = 9;
        const SLOTS_PER_PAGE = 24;
        let currentPage = 1;

        // HARDCODED NATIVE FILES - These guarantee GitHub Pages compatibility.
        // Add any future HTML files to this array exactly like this.
        let actualFiles = [
            { 
                id: "AE30", 
                title: "Spaceship Architect", 
                subtitle: "Naval Blueprint", 
                type: "app", 
                link: "mainPage/shipBuilder.html", // Correct path matching your structure
                utg1: "0.99", utg2: "0.00" 
            },

        ];

        let bootSequence = [
            "ECMS KERNEL V0.4.1 INITIALIZING...",
            "CHECKING FILE SYSTEM: CLEAN",
            "LOADING UI MODULES... [██████████] 100%",
            "ESTABLISHING COMMS LINK... TIMEOUT."
        ];

        const bootText = document.getElementById('boot-text');
        const bootScreen = document.getElementById('boot-screen');
        const fileGrid = document.getElementById('file-grid');
        const pwrOverlay = document.getElementById('power-overlay');
        const sysTitle = document.getElementById('sys-title');

        // -- UTILITY FUNCTIONS --
        function sysNotify(msg) {
            sysTitle.innerText = msg;
            sysTitle.style.color = 'var(--accent-orange)';
            setTimeout(() => {
                sysTitle.innerText = "MAIN.DIRECTORY";
                sysTitle.style.color = 'var(--accent-cyan)';
            }, 2000);
        }

        // Generate a deterministic but random-looking hex ID
        function generateIdStr() {
            return Math.random().toString(36).substr(2, 4).toUpperCase();
        }

        // -- DIRECTORY MOUNTING (HYBRID APPROACH) --
        
        // Method 1: Auto-Mount (Server Environment Fallback)
        async function attemptAutoMount() {
            try {
                let res = await fetch('mainPage/');
                if (res.ok) {
                    let text = await res.text();
                    let parser = new DOMParser();
                    let doc = parser.parseFromString(text, 'text/html');
                    let links = doc.querySelectorAll('a');
                    let foundNew = false;

                    links.forEach(a => {
                        let href = a.getAttribute('href');
                        // Prevent duplicates if already hardcoded in actualFiles
                        if(href && href.endsWith('.html') && href !== '/' && !actualFiles.some(f => f.link.includes(href))) {
                            actualFiles.push({
                                id: generateIdStr(),
                                title: decodeURIComponent(href).replace('.html', '').replace(/[-_]/g, ' '),
                                subtitle: "Mounted File",
                                type: "app",
                                link: "mainPage/" + href,
                                utg1: (Math.random() * 10).toFixed(2),
                                utg2: "0.00"
                            });
                            foundNew = true;
                        }
                    });

                    if(foundNew) {
                        bootSequence.push("AUTO-MOUNT SUCCESSFUL: /mainPage/");
                        return true;
                    }
                }
            } catch(e) {
                // Fails silently in local file:/// due to CORS, which is expected.
            }
            return false;
        }

        // Method 2: Manual Mount (For double-clicked local files testing)
        const dirPicker = document.getElementById('dir-picker');
        document.getElementById('btn-mdir').addEventListener('click', () => {
            dirPicker.click();
        });

        dirPicker.addEventListener('change', (event) => {
            // Keep hardcoded files, add local selected ones
            let newFilesAdded = 0;
            const files = event.target.files;
            
            for (let i = 0; i < files.length; i++) {
                if (files[i].name.endsWith('.html')) {
                    // Prevent duplicates
                    if(!actualFiles.some(f => f.title === files[i].name.replace('.html', ''))) {
                        let blobUrl = URL.createObjectURL(files[i]);
                        actualFiles.push({
                            id: generateIdStr(),
                            title: files[i].name.replace('.html', '').replace(/[-_]/g, ' '),
                            subtitle: "Local Memory",
                            type: "app",
                            link: blobUrl,
                            utg1: (Math.random() * 10).toFixed(2),
                            utg2: "0.00"
                        });
                        newFilesAdded++;
                    }
                }
            }
            sysNotify(`MOUNTED ${newFilesAdded} NEW FILES`);
            generatePage(1);
        });


        // -- PAGINATION & RENDERING --
        function changePageOffset(offset) {
            let target = currentPage + offset;
            if (target >= 1 && target <= MAX_PAGES) generatePage(target);
        }

        function generatePage(pageNum) {
            currentPage = pageNum;
            fileGrid.style.display = 'grid';
            fileGrid.innerHTML = '';
            
            // Update Footer UI
            document.querySelectorAll('.num-btn').forEach(btn => {
                btn.classList.remove('active');
                if(parseInt(btn.innerText) === pageNum) btn.classList.add('active');
            });

            // Calculate Grid Padding Memory Bars
            document.getElementById('mem-fill').style.width = `${(pageNum / MAX_PAGES) * 80}%`;
            document.getElementById('err-fill').style.width = `${Math.pow(pageNum / MAX_PAGES, 2) * 20}%`;

            let startIndex = (pageNum - 1) * SLOTS_PER_PAGE;
            let endIndex = startIndex + SLOTS_PER_PAGE;

            // Algorithm for corruption: Deeper pages get much higher corruption rates
            // Page 1 = ~0% corruption. Page 9 = ~85% corruption.
            let corruptionFactor = Math.pow((pageNum - 1) / (MAX_PAGES - 1), 1.5) * 0.85;

            let displayData = [];
            
            for (let i = startIndex; i < endIndex; i++) {
                if (i < actualFiles.length) {
                    // Slot belongs to a real file
                    displayData.push(actualFiles[i]);
                } else {
                    // Procedural slot padding
                    let isCorrupted = Math.random() < corruptionFactor;
                    let idStr = generateIdStr();

                    if (isCorrupted) {
                        displayData.push({ id: idStr, title: "CORRUPTED", subtitle: "ERR_DATA_LOSS", type: "corrupted", link: "#", utg1: "NaN", utg2: "NaN" });
                    } else {
                        if (Math.random() > 0.4) {
                            displayData.push({ id: idStr, title: "UNALLOCATED", subtitle: "EMPTY_SECTOR", type: "offline", link: "#", utg1: "0.00", utg2: "0.00" });
                        } else {
                            displayData.push({ id: idStr, title: "UNAUTHORIZED", subtitle: "CLEARANCE_REQ", type: "locked", link: "#", utg1: "---", utg2: "---" });
                        }
                    }
                }
            }

            // Render to DOM
            displayData.forEach(file => {
                let isLink = (file.type === 'app' || file.type === 'doc' || file.type === 'sys');
                const el = document.createElement(isLink ? 'a' : 'div');
                
                if (isLink) el.href = file.link;
                el.className = `module ${file.type}`;
                
                let randomData1 = file.utg1 === "NaN" ? (Math.random() * 10).toFixed(2) : file.utg1;
                
                el.innerHTML = `
                    <div class="mod-status">
                        <div class="mod-led"></div>
                        <span>NML</span>
                    </div>
                    <div class="mod-content">
                        <div class="mod-title">${file.title}</div>
                        <div class="mod-data" style="color: #fff; margin-bottom: 5px;">${file.subtitle}</div>
                        <div class="mod-data">
                            <span>UTG1: ${file.type === 'corrupted' ? randomData1 : file.utg1}</span>
                            <span>UTG2: ${file.utg2}</span>
                        </div>
                    </div>
                `;
                fileGrid.appendChild(el);
            });
        }


        // -- BOOT SEQUENCE --
        let bootIndex = 0;
        function playBootText() {
            if (bootIndex < bootSequence.length) {
                bootText.innerHTML += bootSequence[bootIndex] + "<br>";
                bootIndex++;
                let delay = Math.random() * 200 + 50; 
                setTimeout(playBootText, delay);
            } else {
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    generatePage(1);
                }, 300);
            }
        }

        // Hardware Controls
        document.getElementById('btn-pwr').addEventListener('click', () => {
            pwrOverlay.classList.add('active');
        });

        document.getElementById('btn-restart').addEventListener('click', () => {
            // "Reboot" the system
            pwrOverlay.classList.remove('active');
            fileGrid.style.display = 'none';
            bootScreen.style.display = 'flex';
            bootText.innerHTML = "<span class='cursor'></span>";
            bootIndex = 0;
            setTimeout(playBootText, 500);
        });

        // Initialize App
        window.onload = async () => {
            bootText.innerHTML += "<span class='cursor'></span>";
            
            // Wait to see if auto-mount finds anything extra (usually fails locally, passes on servers)
            let success = await attemptAutoMount();
            if (!success && actualFiles.length <= 1) {
                bootSequence.push("DIRECTORY FETCH BLOCKED BY LOCAL PROTOCOL.");
                bootSequence.push("USING PRE-ALLOCATED STATIC MEMORY.");
            } else {
                bootSequence.push("LAUNCHING MFD INTERFACE...");
            }
            
            setTimeout(playBootText, 400);
        };
    </script>
</body>
</html>
