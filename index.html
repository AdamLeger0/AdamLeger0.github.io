<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.O.S.M.O.S. // MFD Select & Reboot — Stable Terminal</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #e0e0e0;
            --accent-cyan: #00ffcc;
            --accent-blue: #0088ff;
            --accent-red: #ff3333;
            --accent-orange: #ffaa00;
            --accent-green: #33ff33;
            --panel-bg: #0a0a0f;
            --border-dim: #333333;
            --selection-glow: rgba(0, 255, 204, 0.7);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            z-index: 1000;
            pointer-events: none;
            opacity: 0.4;
        }

        #power-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(4px);
            z-index: 9999; display: none;
            justify-content: center; align-items: center;
            flex-direction: column;
            gap: 30px;
        }
        #power-overlay.active { display: flex; }
        
        .reboot-btn {
            background: #111;
            border: 2px solid #330000;
            color: #660000;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            padding: 16px 32px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            animation: dimPulse 3s infinite;
            box-shadow: 0 0 10px rgba(255,0,0,0.2);
        }
        .reboot-btn:hover {
            background: #1a0000;
            border-color: #990000;
            color: #ff4444;
            box-shadow: 0 0 25px rgba(255,0,0,0.4);
        }
        .reboot-btn:active {
            transform: scale(0.97);
        }
        @keyframes dimPulse {
            0%, 100% { opacity: 0.5; border-color: #330000; text-shadow: none; }
            50% { opacity: 0.9; border-color: #aa0000; text-shadow: 0 0 8px rgba(255,0,0,0.5); }
        }

        .mfd-container {
            width: 100%; height: 100%;
            border: 2px solid var(--border-dim);
            display: flex; flex-direction: column;
            background: var(--bg-color);
            box-shadow: inset 0 0 100px rgba(0, 255, 204, 0.05);
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; border-bottom: 2px solid var(--border-dim);
            font-size: 14px; font-weight: bold; letter-spacing: 2px;
            background: #000;
        }
        .header-left { color: var(--accent-cyan); display: flex; gap: 20px; }
        .header-left .title { border: 1px solid var(--accent-cyan); padding: 2px 10px; transition: color 0.2s; min-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .header-right { color: var(--text-main); font-size: 12px; }

        .main-display { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 120px; display: flex; flex-direction: column; gap: 10px;
            padding: 20px 10px; background: #000; border-right: 2px solid var(--border-dim);
            transition: opacity 0.25s ease, filter 0.25s ease;
        }
        .sidebar.right { border-right: none; border-left: 2px solid var(--border-dim); align-items: flex-end;}
        .sidebar.boot-disabled {
            pointer-events: none;
            opacity: 0.45;
            filter: grayscale(0.4);
        }

        .nav-btn {
            background: transparent; color: var(--text-main);
            border: 1px solid var(--border-dim); padding: 8px 10px;
            font-family: inherit; font-size: 12px; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; text-align: center; width: 100%;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.1s;
        }
        .nav-btn::before { content: '■'; font-size: 8px; color: var(--border-dim); }
        .nav-btn:hover { border-color: var(--text-main); background: rgba(255,255,255,0.1); }
        .nav-btn:active { background: var(--text-main); color: #000; }
        .sidebar.right .nav-btn { flex-direction: row-reverse; }
        .spacer { flex: 1; }

        .center-console {
            flex: 1;
            position: relative;
            background: var(--panel-bg);
            overflow: hidden;
        }

        #boot-screen, #diag-screen, #console-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            padding: 40px;
            box-sizing: border-box;
            font-size: 14px;
            line-height: 1.5;
            color: var(--accent-cyan);
            overflow-y: auto;
            transition: opacity 0.3s ease;
            z-index: 45;
        }
        #boot-screen { z-index: 50; }
        #diag-screen {
            z-index: 55;
            background: #010104;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #diag-screen.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        #boot-screen.boot-hidden {
            opacity: 0;
            visibility: hidden;
        }
        #console-screen {
            z-index: 65;
            background: #03030a;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 0;
            font-family: 'Courier New', monospace;
        }
        #console-screen.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        #console-output {
            flex: 1;
            background: #000;
            padding: 20px;
            overflow-y: auto;
            font-size: 13px;
            color: #bbffdd;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            margin: 0;
            border-bottom: 1px solid #1f3f3f;
        }
        .console-input-line {
            display: flex;
            align-items: center;
            background: #0a0a0f;
            border-top: 1px solid #2a4c4c;
            padding: 10px 20px;
            gap: 12px;
        }
        .console-prompt {
            color: var(--accent-cyan);
            font-weight: bold;
            font-size: 14px;
        }
        #console-input {
            background: transparent;
            border: none;
            color: var(--accent-green);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            flex: 1;
            outline: none;
            caret-color: var(--accent-cyan);
        }
        .console-close-btn {
            position: absolute;
            bottom: 20px;
            right: 30px;
            background: #111;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 6px 12px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            z-index: 70;
        }
        .console-close-btn:hover {
            background: var(--accent-cyan);
            color: #000;
        }

        #file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            grid-auto-rows: 80px;
            padding: 30px;
            height: 100%;
            overflow-y: auto;
            transition: opacity 0.55s ease-in-out;
            opacity: 0;
        }
        #file-grid.grid-visible {
            opacity: 1;
        }

        .module {
            background: #000;
            border: 1px solid var(--border-dim);
            height: 100%;
            display: flex;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            position: relative;
        }
        .module:hover:not(.module-selected) { border-color: var(--text-main); transform: scale(1.02); z-index: 10; box-shadow: 0 0 15px rgba(255,255,255,0.1);}
        .module-selected {
            border: 2px solid var(--accent-cyan);
            box-shadow: 0 0 18px var(--selection-glow);
            transform: scale(1.02);
            z-index: 20;
        }
        .module-selected .mod-led { box-shadow: 0 0 8px var(--accent-cyan); }
        .mod-status { width: 15px; height: 100%; border-right: 1px solid var(--border-dim); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 5px 0; box-sizing: border-box;}
        .mod-status span { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 8px; color: var(--border-dim); letter-spacing: 2px;}
        .mod-led { width: 80%; height: 20px; background: var(--accent-cyan); margin-bottom: 5px; }
        .mod-content { flex: 1; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;}
        .mod-title { font-weight: bold; font-size: 12px; color: var(--text-main); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .mod-data { font-size: 9px; color: var(--border-dim); display: flex; flex-direction: column; gap: 2px;}
        .module.sys .mod-led { background: var(--text-main); }
        .module.app .mod-led { background: var(--accent-cyan); }
        .module.offline { opacity: 0.5; border-style: dashed; cursor: not-allowed; }
        .module.offline .mod-led { background: var(--border-dim); }
        .module.offline .mod-title { color: #888; }
        .module.offline:hover { transform: none; border-color: var(--border-dim); }
        .module.locked .mod-led { background: var(--accent-orange); }
        .module.locked .mod-title { color: var(--accent-orange); }
        .module.locked { cursor: not-allowed; border-color: #554400; }
        .module.corrupted { border-color: #440000; cursor: not-allowed;}
        .module.corrupted .mod-led { background: var(--accent-red); }
        .module.corrupted .mod-title { color: var(--accent-red); }

        .footer {
            display: flex; gap: 10px; padding: 10px 20px; border-top: 2px solid var(--border-dim);
            background: #000; align-items: center; justify-content: center;
        }
        .num-btn {
            background: transparent; border: 1px solid var(--border-dim); color: var(--text-main);
            width: 40px; height: 30px; display: flex; justify-content: center; align-items: center;
            font-family: inherit; font-size: 12px; cursor: pointer; border-bottom: 4px solid var(--border-dim);
            transition: all 0.1s;
        }
        .num-btn:hover { background: rgba(255,255,255,0.1); }
        .num-btn:active { border-bottom: 1px solid var(--border-dim); transform: translateY(3px); background: var(--text-main); color:#000; }
        .num-btn.active { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); border-bottom: 2px solid #00aa88; transform: translateY(2px); }

        .sys-status-bar { flex: 1; height: 4px; background: var(--border-dim); display: flex; margin-left: 20px;}
        .sys-status-bar .fill { width: 35%; height: 100%; background: var(--accent-cyan); border-right: 2px solid #000; transition: width 0.3s;}
        .sys-status-bar .fill.err { width: 10%; background: var(--accent-red); }

        .diag-close-btn {
            position: absolute;
            bottom: 20px;
            right: 30px;
            background: #111;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 6px 12px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            z-index: 60;
        }
        .diag-close-btn:hover {
            background: var(--accent-cyan);
            color: #000;
        }
        .cursor { display: inline-block; width: 8px; height: 15px; background: var(--accent-cyan); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 5px;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
<div class="scanlines"></div>
<div id="power-overlay">
    <button class="reboot-btn" id="btn-restart">⟳ REBOOT SYSTEM</button>
    <div style="color:#660000; font-size:12px; letter-spacing:2px;">POWER OFF // STANDBY MODE</div>
</div>

<div class="mfd-container">
    <div class="header">
        <div class="header-left"><div class="title" id="sys-title">MAIN.DIRECTORY</div><div style="color: var(--border-dim);" id="sys-path">ECMS_OS//DATA.DISPLAY//ROOT</div></div>
        <div class="header-right">COSM-OS.CYCLER.SYSTEM_OS &nbsp;&nbsp; <span id="headerVersionValue">V0.9.0</span></div>
    </div>
    <div class="main-display">
        <div class="sidebar left boot-disabled" id="leftSidebar">
            <input type="file" id="dir-picker" webkitdirectory directory multiple style="display:none;">
            <button class="nav-btn" id="btn-mdir" title="Mount Local Folder">MDIR</button>
            <button class="nav-btn" style="margin-bottom: 20px;" id="btn-back">BACK</button>
            <button class="nav-btn" id="btn-sel" style="border-color: var(--accent-cyan); color: var(--accent-cyan);">SEL</button>
            <button class="nav-btn" id="btn-up">UP</button>
            <button class="nav-btn" id="btn-dwn">DWN</button>
            <button class="nav-btn" id="btn-left">LEFT</button>
            <button class="nav-btn" id="btn-right">RIGHT</button>
            <button class="nav-btn" id="btn-clear" style="border-color: var(--accent-red); color: var(--accent-red);">CLEAR</button>
            <div class="spacer"></div>
            <button class="nav-btn" id="btn-cons">CONS</button>
            <button class="nav-btn" id="btn-sys">SYS</button>
            <button class="nav-btn" id="btn-kbrd">KBRD</button>
        </div>

        <div class="center-console">
            <div id="boot-screen"><div id="boot-text"><span class="cursor"></span></div></div>
            <div id="diag-screen"><pre id="diag-output" style="margin:0; font-family:'Courier New', monospace; white-space:pre-wrap;"></pre><button class="diag-close-btn" id="diag-close">[ EXIT ]</button></div>
            <div id="console-screen">
                <div id="console-output"></div>
                <div class="console-input-line">
                    <span class="console-prompt">ECMS> </span>
                    <input type="text" id="console-input" autocomplete="off" spellcheck="false">
                </div>
                <button class="console-close-btn" id="console-exit-btn">[ EXIT ]</button>
            </div>
            <div id="file-grid"></div>
        </div>

        <div class="sidebar right boot-disabled" id="rightSidebar">
            <button class="nav-btn" id="btn-disp">DISP</button>
            <button class="nav-btn" id="btn-tgt">TGT</button>
            <button class="nav-btn" style="margin-bottom: 20px;" id="btn-num">NUM</button>
            <button class="nav-btn" id="btn-cycl">CYCL</button>
            <div class="spacer"></div>
            <button class="nav-btn" id="pgUpBtn">PG +</button>
            <button class="nav-btn" style="margin-bottom: 20px;" id="pgDownBtn">PG -</button>
            <button class="nav-btn" id="btn-diag" style="color: var(--accent-green); border-color: var(--accent-green);">DIAG</button>
            <button class="nav-btn" id="btn-test" style="color: #555; border-color: #444; opacity:0.5;" disabled>TEST</button>
            <button class="nav-btn" id="btn-pwr" style="color: var(--accent-red); border-color: var(--accent-red);">PWR</button>
        </div>
    </div>
    <div class="footer">
        <button class="num-btn" data-page="1">1</button><button class="num-btn" data-page="2">2</button>
        <button class="num-btn" data-page="3">3</button><button class="num-btn" data-page="4">4</button>
        <button class="num-btn" data-page="5">5</button><button class="num-btn" data-page="6">6</button>
        <button class="num-btn" data-page="7">7</button><button class="num-btn" data-page="8">8</button>
        <button class="num-btn" data-page="9">9</button>
        <div class="sys-status-bar"><div class="fill" id="mem-fill"></div><div class="fill err" id="err-fill"></div></div>
    </div>
</div>

<script>
(function(){
    // ---------- SYSTEM CONFIG ----------
    const MAX_PAGES = 9;
    const SLOTS_PER_PAGE = 24;
    const TOTAL_SLOTS = MAX_PAGES * SLOTS_PER_PAGE;
    const bootTimestamp = Date.now();
    
    const BASE_FILES = [
        { id: "AE30", title: "Spaceship Architect", subtitle: "Naval Blueprint", type: "app", link: "mainPages/shipBuilder.html", utg1: "0.99", utg2: "0.00" },
        { id: "NAV01", title: "Navigation Core", subtitle: "Vector Comp.", type: "app", link: "mainPages/navCore.html", utg1: "2.34", utg2: "0.12" },
        { id: "SYS_CORE", title: "ECMS Kernel", subtitle: "System RT", type: "sys", link: "https://www.shutterstock.com/image-photo/one-dried-corn-kernel-placed-260nw-2199556965.jpg", utg1: "4.56", utg2: "0.01" }
    ];
    
    let actualFiles = [];
    let fileSlots = new Array(TOTAL_SLOTS);
    let currentPage = 1;
    let bootSeed = 0;
    let bootCompleted = false;
    let selectedIndex = -1;
    let currentGridModules = [];
    let diagActive = false;
    let consoleActive = false;
    let commandHistory = [];
    let historyPos = 0;
    let pendingRefresh = false;
    
    // Defrag mini-game state (Wordle-style, but not called "game")
    let hackActive = false;
    let hackWord = "";
    let hackAttempts = 0;
    let hackWordLen = 0;
    
    const wordPool = ["SYSTEM","KERNEL","MEMORY","CACHE","BUFFER","DRIVER","INTERRUPT","PAGING","SECTOR","MODULE","PROCESS","THREAD","DAEMON","BOOTLOAD","COMPILER","PROTOCOL"];
    const memoryFragments = [
        "Memory fragment: The first programmable computer, Z3, was completed in 1941 by Konrad Zuse.",
        "Fragment: The Apollo Guidance Computer had 2KB of RAM and 36KB of ROM.",
        "Data shard: The term 'bug' originated from a moth trapped in Harvard Mark II.",
        "Core dump: ENIAC weighed 30 tons and used 18,000 vacuum tubes.",
        "Recall: The C programming language was created between 1969 and 1973.",
        "Sector read: The first hard drive, IBM 350, stored 3.75 MB.",
        "Bit rot: The highest corruption rate ever recorded was 68% in this sector.",
        "Log entry: CMOS batteries typically last 10 years.",
        "Archive: The first 1GB hard drive cost $40,000 in 1980.",
        "Cache line: There are over 700 programming languages in use today."
    ];
    
    // Easter eggs (hidden)
    const easterEggs = {
        "coffee": "☕ Brewing fresh bytecode... System ready.",
        "42": "The answer to life, the universe, and everything.",
        "sudo": "Nice try. You are already root.",
        "vger": "V'GER is listening. Your actions have been logged.",
        "hal": "I'm sorry, Dave. I'm afraid I can't do that. (just kidding)",
        "trek": "🖖 Live long and prosper.",
        "cookies": "🍪 Cookie jar empty. Try 'coffee' instead."
    };
    
    const fortunes = [
        "> The stars whisper of distant nebulae.",
        "> Cosmic radiation levels nominal.",
        "> A ghost signal repeats on channel 9.",
        "> Your last backup is intact.",
        "> Entropy is stable.",
        "> Singularity detected in sector 7."
    ];
    
    function getUptime() {
        const diff = Date.now() - bootTimestamp;
        const secs = Math.floor(diff / 1000);
        const hrs = Math.floor(secs / 3600);
        const mins = Math.floor((secs % 3600) / 60);
        const secsRem = secs % 60;
        return `${hrs}h ${mins}m ${secsRem}s`;
    }
    
    function setTheme(color) {
        const root = document.documentElement;
        switch(color) {
            case 'cyan': root.style.setProperty('--accent-cyan', '#00ffcc'); root.style.setProperty('--accent-green', '#33ff33'); break;
            case 'green': root.style.setProperty('--accent-cyan', '#33ff33'); root.style.setProperty('--accent-green', '#33ff33'); break;
            case 'red': root.style.setProperty('--accent-cyan', '#ff5555'); root.style.setProperty('--accent-green', '#ff8888'); break;
            case 'orange': root.style.setProperty('--accent-cyan', '#ffaa44'); root.style.setProperty('--accent-green', '#ffcc66'); break;
            default: return false;
        }
        return true;
    }
    
    window.sysNotify = function(msg) {
        const titleEl = document.getElementById('sys-title');
        if(titleEl) {
            titleEl.innerText = msg;
            titleEl.style.color = 'var(--accent-orange)';
            setTimeout(() => {
                if(document.getElementById('sys-title')) {
                    document.getElementById('sys-title').innerText = "MAIN.DIRECTORY";
                    document.getElementById('sys-title').style.color = 'var(--accent-cyan)';
                }
            }, 4000);
        }
    };
    
    function seededRandom(seed, idx) {
        let s = seed + idx * 131071;
        let t = (s ^ (s >>> 15)) * 0x85ebca6b;
        t = (t ^ (t >>> 13)) * 0xc2b2ae35;
        return ((t ^ (t >>> 16)) >>> 0) / 4294967296;
    }
    
    // Only dummy slots (beyond actualFiles) can be corrupted/locked/offline.
    // Real mounted files (including BASE_FILES and user-mounted) are never modified.
    function rebuildFileSlots() {
        for(let i = 0; i < TOTAL_SLOTS; i++) fileSlots[i] = null;
        // Place real files first
        for(let i = 0; i < actualFiles.length && i < TOTAL_SLOTS; i++) {
            fileSlots[i] = { ...actualFiles[i] };
        }
        // Fill remaining slots with dummy entries (corruptible)
        for(let i = actualFiles.length; i < TOTAL_SLOTS; i++) {
            const pageNum = Math.floor(i / SLOTS_PER_PAGE) + 1;
            let depthFactor = (pageNum - 1) / (MAX_PAGES - 1);
            if(MAX_PAGES === 1) depthFactor = 0;
            let corruptionProb = Math.pow(depthFactor, 1.5) * 0.85;
            corruptionProb = Math.min(0.85, corruptionProb);
            let lockProb = 0.3;
            if(corruptionProb + lockProb > 0.98) lockProb = 0.98 - corruptionProb;
            const r = seededRandom(bootSeed, i);
            let type, title, subtitle, utg1, utg2;
            if(r < corruptionProb) {
                type = "corrupted";
                title = "CORRUPTED";
                subtitle = "ERR_DATA_LOSS";
                utg1 = (seededRandom(bootSeed, i+777) * 9.99).toFixed(2);
                utg2 = "NaN";
            } else if(r < corruptionProb + lockProb) {
                type = "locked";
                title = "UNAUTHORIZED";
                subtitle = "CLEARANCE_REQ";
                utg1 = "---";
                utg2 = "---";
            } else {
                type = "offline";
                title = "UNALLOCATED";
                subtitle = "EMPTY_SECTOR";
                utg1 = "0.00";
                utg2 = "0.00";
            }
            const idHex = (seededRandom(bootSeed, i+5000)*10000).toString(16).substr(0,4).toUpperCase();
            fileSlots[i] = { id: idHex, title, subtitle, type, link: "#", utg1, utg2 };
        }
    }
    
    // Corruption only affects dummy slots (i >= actualFiles.length)
    function inflictCorruption(count) {
        let inflicted = 0;
        for(let i = actualFiles.length; i < TOTAL_SLOTS && inflicted < count; i++) {
            if(fileSlots[i] && fileSlots[i].type !== 'corrupted') {
                fileSlots[i].type = 'corrupted';
                fileSlots[i].title = 'CORRUPTED';
                fileSlots[i].subtitle = 'ERR_DATA_LOSS';
                fileSlots[i].utg1 = (Math.random() * 9.99).toFixed(2);
                fileSlots[i].utg2 = 'NaN';
                inflicted++;
            }
        }
        return inflicted;
    }
    
    function healCorruption(count) {
        let healed = 0;
        for(let i = actualFiles.length; i < TOTAL_SLOTS && healed < count; i++) {
            if(fileSlots[i] && fileSlots[i].type === 'corrupted') {
                fileSlots[i].type = 'offline';
                fileSlots[i].title = 'RECOVERED';
                fileSlots[i].subtitle = 'REPAIRED_SECTOR';
                fileSlots[i].utg1 = '0.00';
                fileSlots[i].utg2 = '0.00';
                healed++;
            }
        }
        return healed;
    }
    
    function addMountedFiles(newFilesArray) {
        let added = 0;
        for(let f of newFilesArray) {
            if(!actualFiles.some(ex => ex.title === f.title)) {
                actualFiles.push(f);
                added++;
            }
        }
        if(added > 0) {
            rebuildFileSlots();
            if(bootCompleted && !diagActive && !consoleActive) {
                generatePage(currentPage);
                if(selectedIndex !== -1 && selectedIndex < TOTAL_SLOTS && fileSlots[selectedIndex]) highlightSelection();
                else clearSelection();
            } else if(consoleActive) pendingRefresh = true;
            window.sysNotify(`MOUNTED ${added} NEW FILE(S)`);
        }
        return added;
    }
    
    function refreshUI() {
        if(bootCompleted && !diagActive && !consoleActive) {
            generatePage(currentPage);
            if(selectedIndex !== -1 && selectedIndex < TOTAL_SLOTS && fileSlots[selectedIndex]) highlightSelection();
            else clearSelection();
        } else if(consoleActive) pendingRefresh = true;
    }
    
    function highlightSelection() {
        if(currentGridModules) currentGridModules.forEach(mod => mod.classList.remove('module-selected'));
        if(selectedIndex === -1) return;
        const startIdx = (currentPage-1) * SLOTS_PER_PAGE;
        if(selectedIndex >= startIdx && selectedIndex < startIdx + SLOTS_PER_PAGE) {
            const relIdx = selectedIndex - startIdx;
            if(currentGridModules && currentGridModules[relIdx]) {
                currentGridModules[relIdx].classList.add('module-selected');
                currentGridModules[relIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }
    }
    
    function clearSelection() {
        selectedIndex = -1;
        if(currentGridModules) currentGridModules.forEach(mod => mod.classList.remove('module-selected'));
        window.sysNotify("SELECTION CLEARED");
    }
    
    function moveSelection(dx, dy) {
        if(!bootCompleted || diagActive || consoleActive) return;
        const startIdx = (currentPage-1) * SLOTS_PER_PAGE;
        const endIdx = Math.min(startIdx + SLOTS_PER_PAGE, TOTAL_SLOTS);
        const slotsOnPage = endIdx - startIdx;
        if(slotsOnPage === 0) return;
        const gridEl = document.getElementById('file-grid');
        let columns = 1;
        const gridStyle = window.getComputedStyle(gridEl);
        const gridTemplateColumns = gridStyle.getPropertyValue('grid-template-columns');
        if(gridTemplateColumns && gridTemplateColumns !== 'none') {
            columns = gridTemplateColumns.split(' ').length;
        } else {
            columns = Math.max(1, Math.floor(gridEl.clientWidth / 150));
        }
        let currentRel = (selectedIndex !== -1 && selectedIndex >= startIdx && selectedIndex < endIdx) ? selectedIndex - startIdx : 0;
        let newRel = currentRel;
        if(dy !== 0) newRel += dy * columns;
        if(dx !== 0) newRel += dx;
        newRel = Math.min(slotsOnPage-1, Math.max(0, newRel));
        const newGlobal = startIdx + newRel;
        if(newGlobal >=0 && newGlobal < TOTAL_SLOTS && fileSlots[newGlobal]) {
            selectedIndex = newGlobal;
            highlightSelection();
            const slot = fileSlots[selectedIndex];
            window.sysNotify(`SELECTED: ${slot.title} (${slot.subtitle})`);
        }
    }
    
    function activateModuleBySlot(slot) {
        if(!bootCompleted || diagActive || consoleActive) { window.sysNotify("SYSTEM BUSY"); return false; }
        if(!slot) return false;
        if(slot.type === 'corrupted') window.sysNotify("ERROR: DATA CORRUPTED - UNABLE TO ACCESS");
        else if(slot.type === 'locked') window.sysNotify("ACCESS DENIED: CLEARANCE LEVEL INSUFFICIENT");
        else if(slot.type === 'offline') window.sysNotify("SECTOR UNALLOCATED: NO DATA PRESENT");
        else if(slot.type === 'app' || slot.type === 'sys') {
            if(slot.link && slot.link !== '#') {
                window.sysNotify(`LAUNCHING: ${slot.title}...`);
                setTimeout(() => { window.open(slot.link, '_blank'); }, 100);
            } else window.sysNotify(`MODULE ${slot.title} (SIMULATED)`);
            return true;
        } else window.sysNotify(`UNKNOWN MODULE TYPE`);
        return false;
    }
    
    function activateSelectedModule() {
        if(!bootCompleted || selectedIndex === -1 || diagActive || consoleActive) { window.sysNotify("NO ACTIVE SELECTION"); return; }
        activateModuleBySlot(fileSlots[selectedIndex]);
    }
    
    function generatePage(pageNum) {
        if(!bootCompleted || diagActive || consoleActive) return;
        currentPage = Math.min(MAX_PAGES, Math.max(1, pageNum));
        const grid = document.getElementById('file-grid');
        if(!grid) return;
        grid.innerHTML = '';
        document.querySelectorAll('.num-btn').forEach(btn => {
            btn.classList.remove('active');
            if(parseInt(btn.getAttribute('data-page')) === currentPage) btn.classList.add('active');
        });
        const totalReal = actualFiles.length;
        const memPercent = Math.min(100, (totalReal / TOTAL_SLOTS) * 100);
        const corruptedCount = fileSlots.filter(s => s && s.type === 'corrupted').length;
        const errPercent = Math.min(80, (corruptedCount / TOTAL_SLOTS) * 100);
        document.getElementById('mem-fill').style.width = `${memPercent}%`;
        document.getElementById('err-fill').style.width = `${errPercent}%`;
        
        const startIdx = (currentPage-1) * SLOTS_PER_PAGE;
        const endIdx = Math.min(startIdx + SLOTS_PER_PAGE, TOTAL_SLOTS);
        const modules = [];
        for(let i = startIdx; i < endIdx; i++) {
            const slot = fileSlots[i];
            if(!slot) continue;
            const isLink = (slot.type === 'app' || slot.type === 'sys');
            const el = isLink ? document.createElement('a') : document.createElement('div');
            if(isLink && slot.link && slot.link !== '#') el.href = slot.link;
            el.className = `module ${slot.type}`;
            el.innerHTML = `<div class="mod-status"><div class="mod-led"></div><span>${slot.type === 'corrupted' ? 'ERR' : 'NML'}</span></div>
                <div class="mod-content"><div class="mod-title">${escapeHtml(slot.title)}</div>
                <div class="mod-data" style="color:#fff; margin-bottom:5px;">${escapeHtml(slot.subtitle)}</div>
                <div class="mod-data"><span>UTG1: ${slot.utg1}</span><span>UTG2: ${slot.utg2}</span></div></div>`;
            const globalIdx = i;
            el.addEventListener('click', (e) => {
                e.preventDefault();
                if(!bootCompleted || diagActive || consoleActive) return;
                selectedIndex = globalIdx;
                highlightSelection();
                window.sysNotify(`SELECTED: ${fileSlots[globalIdx].title}`);
            });
            el.addEventListener('dblclick', (e) => {
                e.preventDefault();
                if(!bootCompleted || diagActive || consoleActive) return;
                activateModuleBySlot(fileSlots[globalIdx]);
            });
            grid.appendChild(el);
            modules.push(el);
        }
        currentGridModules = modules;
        if(selectedIndex !== -1 && selectedIndex >= startIdx && selectedIndex < endIdx) highlightSelection();
        else if(currentGridModules) currentGridModules.forEach(m => m.classList.remove('module-selected'));
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function changePageOffset(delta) {
        if(!bootCompleted || diagActive || consoleActive) return;
        const newPage = currentPage + delta;
        if(newPage>=1 && newPage<=MAX_PAGES) generatePage(newPage);
        else window.sysNotify("PAGE LIMIT REACHED");
    }
    
    // ---------- DEFRAG MINI-GAME (Wordle style, no "game" term) ----------
    function startDefrag() {
        if(hackActive) { appendToConsole("Defrag already in progress.", true); return false; }
        const randomIndex = Math.floor(Math.random() * wordPool.length);
        hackWord = wordPool[randomIndex];
        hackWordLen = hackWord.length;
        hackAttempts = 5;
        hackActive = true;
        appendToConsole("=== ECMS DEFRAG UTILITY ===");
        appendToConsole(`Target length: ${hackWordLen} characters.`);
        appendToConsole(`Attempts remaining: ${hackAttempts}`);
        appendToConsole("Guess the memory segment word. Type your guess:");
        return true;
    }
    
    function evaluateDefragGuess(guess) {
        if(!hackActive) return false;
        let guessUpper = guess.trim().toUpperCase();
        if(guessUpper.length !== hackWordLen) {
            appendToConsole(`Word must be ${hackWordLen} letters.`, true);
            return false;
        }
        let correctPos = 0;
        let correctLetters = 0;
        let targetArr = hackWord.split('');
        let guessArr = guessUpper.split('');
        let targetUsed = new Array(hackWordLen).fill(false);
        let guessUsed = new Array(hackWordLen).fill(false);
        for(let i=0; i<hackWordLen; i++) {
            if(guessArr[i] === targetArr[i]) {
                correctPos++;
                targetUsed[i] = true;
                guessUsed[i] = true;
            }
        }
        for(let i=0; i<hackWordLen; i++) {
            if(guessUsed[i]) continue;
            for(let j=0; j<hackWordLen; j++) {
                if(!targetUsed[j] && guessArr[i] === targetArr[j]) {
                    correctLetters++;
                    targetUsed[j] = true;
                    break;
                }
            }
        }
        if(guessUpper === hackWord) {
            let healed = healCorruption(Math.floor(Math.random() * 6) + 2);
            let fragment = memoryFragments[Math.floor(Math.random() * memoryFragments.length)];
            appendToConsole(`> DEFRAG SUCCESS! Recovered ${healed} corrupted sectors.`);
            appendToConsole(`> ${fragment}`);
            hackActive = false;
            refreshUI();
            return true;
        } else {
            hackAttempts--;
            appendToConsole(`> ${guessUpper} : ${correctPos} exact, ${correctLetters} misplaced. Attempts left: ${hackAttempts}`);
            if(hackAttempts <= 0) {
                let newCorrupt = inflictCorruption(3);
                appendToConsole(`> DEFRAG FAILED. System penalty: ${newCorrupt} new corruption in dummy sectors.`);
                hackActive = false;
                refreshUI();
                return false;
            }
            return false;
        }
    }

    function appendToConsole(text, isError = false) {
        const span = document.createElement('div');

        span.style.whiteSpace = 'pre-wrap';

    // Maintenance commands (no "game" term, use defrag)
    function maintenanceCmd(args) {
        if(args.length === 0) { appendToConsole("Maintenance subcommands: seed, repair, stats, corrupt, defrag"); return; }
        const sub = args[0].toLowerCase();
        if(sub === 'seed') {
            let newSeed = args[1] ? parseInt(args[1]) : Math.floor(Math.random() * 1000000);
            if(isNaN(newSeed)) newSeed = Math.floor(Math.random() * 1000000);
            bootSeed = newSeed;
            rebuildFileSlots();
            appendToConsole(`Boot seed changed to: ${bootSeed}`);
            refreshUI();
        } else if(sub === 'repair') {
            let healed = healCorruption(5);
            appendToConsole(`Repair operation: ${healed} corrupted sectors recovered.`);
            if(healed === 0) appendToConsole("No corrupted dummy sectors found.");
            refreshUI();
        } else if(sub === 'stats') {
            const corrupted = fileSlots.filter(s => s && s.type === 'corrupted').length;
            const locked = fileSlots.filter(s => s && s.type === 'locked').length;
            const offline = fileSlots.filter(s => s && s.type === 'offline').length;
            const normal = TOTAL_SLOTS - (corrupted + locked + offline);
            appendToConsole(`Maintenance stats:\n  Normal: ${normal}\n  Locked: ${locked}\n  Corrupted: ${corrupted}\n  Offline/Empty: ${offline}\n  Seed: ${bootSeed}`);
        } else if(sub === 'corrupt') {
            let amount = args[1] ? Math.min(10, Math.max(1, parseInt(args[1]))) : 1;
            if(isNaN(amount)) amount = 1;
            let inflicted = inflictCorruption(amount);
            appendToConsole(`Forced corruption: ${inflicted} new corrupted dummy sectors.`);
            refreshUI();
        } else if(sub === 'defrag') {
            startDefrag();
        } else {
            appendToConsole(`Unknown maintenance subcommand: ${sub}`, true);
        }
    }
    
    function openFile(query) {
        if(!query) { appendToConsole("Usage: open <title|id>", true); return; }
        const lowerQuery = query.toLowerCase();
        const found = actualFiles.find(f => f.title.toLowerCase() === lowerQuery || f.id.toLowerCase() === lowerQuery);
        if(!found) { appendToConsole(`File not found: ${query}`, true); return; }
        if(found.type === 'corrupted' || found.type === 'locked' || found.type === 'offline') {
            appendToConsole(`Cannot open: ${found.title} (${found.type})`, true);
            return;
        }
        if(found.link && found.link !== '#') {
            appendToConsole(`Launching ${found.title}...`);
            setTimeout(() => { window.open(found.link, '_blank'); }, 100);
        } else {
            appendToConsole(`Simulated launch of ${found.title} (no external link)`);
        }
    }

    function drawTree() {
        let lines = ["STORAGE TREE (per page summary):"];
        for(let p=1; p<=MAX_PAGES; p++) {
            const start = (p-1)*SLOTS_PER_PAGE;
            let corrupted = 0, locked = 0, offline = 0, normal = 0;
            for(let i=start; i<start+SLOTS_PER_PAGE && i<TOTAL_SLOTS; i++) {
                const s = fileSlots[i];
                if(!s) continue;
                if(s.type === 'corrupted') corrupted++;
                else if(s.type === 'locked') locked++;
                else if(s.type === 'offline') offline++;
                else normal++;
            }
            lines.push(`PAGE ${p}: [OK:${normal} LOCK:${locked} COR:${corrupted} EMPTY:${offline}]`);
        }
        lines.forEach(l => appendToConsole(l));
    }

    async function executeCommand(cmdLine) {
        const trimmed = cmdLine.trim();
        if(trimmed === "") return;
        if(hackActive) {
            evaluateDefragGuess(trimmed);
            return;
        }
        commandHistory.push(trimmed);
        historyPos = commandHistory.length;
        appendToConsole(`ECMS> ${trimmed}`);
        const parts = trimmed.split(/\s+/);
        const command = parts[0].toLowerCase();
        const args = parts.slice(1);
        
        if(easterEggs[command]) {
            appendToConsole(easterEggs[command]);
            return;
        }
        
        switch(command) {
            case 'help': showHelp(); break;
            case 'clear': case 'cls': consoleOutput.innerHTML = ""; appendToConsole("ECMS Console cleared."); break;
            case 'ls': case 'dir': {
                let output = "MOUNTED MODULES:\n" + actualFiles.map(f => `  [${f.type.toUpperCase()}] ${f.title} (${f.subtitle})`).join("\n");
                output += `\nTOTAL VALID SLOTS: ${fileSlots.filter(s => s && s.type !== 'offline').length}/${TOTAL_SLOTS}`;
                appendToConsole(output);
                break;
            }
            case 'open': openFile(args.join(" ")); break;
            case 'echo': appendToConsole(args.join(" ") || ""); break;
            case 'version': case 'ver': appendToConsole("ECMS OS // C.O.S.M.O.S. CORE v0.9.0 (Stable Terminal)"); break;
            case 'status': case 'stats': {
                const total = TOTAL_SLOTS;
                const occupied = fileSlots.filter(s => s && s.type !== 'offline').length;
                const corrupted = fileSlots.filter(s => s && s.type === 'corrupted').length;
                const health = ((total - corrupted) / total * 100).toFixed(1);
                appendToConsole(`SYSTEM STATUS:`);
                appendToConsole(`  TOTAL SECTORS: ${total}`);
                appendToConsole(`  OCCUPIED: ${occupied}`);
                appendToConsole(`  CORRUPTED: ${corrupted}`);
                appendToConsole(`  HEALTH: ${health}%`);
                appendToConsole(`  BOOT SEED: ${bootSeed.toString().slice(-8)}`);
                break;
            }
            case 'date': appendToConsole(new Date().toLocaleString()); break;
            case 'uptime': appendToConsole(`System uptime: ${getUptime()}`); break;
            case 'dice': case 'roll': {
                const roll = Math.floor(Math.random() * 20) + 1;
                appendToConsole(`🎲 Rolling d20... ${roll} (${roll === 20 ? 'CRITICAL!' : roll === 1 ? 'CATASTROPHIC' : 'normal'})`);
                break;
            }
            case 'fortune': {
                const idx = Math.floor(Math.random() * fortunes.length);
                appendToConsole(fortunes[idx]);
                break;
            }
            case 'motd': {
                appendToConsole("MOTD: This terminal is stable. Use 'maintenance defrag' to clean dummy sectors.");
                break;
            }
            case 'ping': {
                const target = args[0] || "localhost";
                const latency = (Math.random() * 80 + 10).toFixed(1);
                appendToConsole(`PING ${target}: 64 bytes, time=${latency}ms TTL=64`);
                break;
            }
            case 'scan': await simulateScan(); break;
            case 'matrix': matrixEffect(); break;
            case 'neofetch': neofetch(); break;
            case 'cowsay': cowsay(args.join(" ") || "moo"); break;
            case 'tree': drawTree(); break;
            case 'calc': if(args.length) simpleCalculator(args.join(" ")); else appendToConsole("Usage: calc <expression>", true); break;
            case 'theme': {
                if(!args[0]) { appendToConsole("Usage: theme cyan|green|red|orange"); break; }
                if(setTheme(args[0])) appendToConsole(`Theme changed to ${args[0]}.`);
                else appendToConsole("Invalid theme. Options: cyan, green, red, orange", true);
                break;
            }
            case 'maintenance': maintenanceCmd(args); break;
            case 'reboot': {
                appendToConsole("REBOOT INITIATED. Power cycling...");
                setTimeout(() => {
                    document.getElementById('power-overlay').classList.add('active');
                    hideConsole();
                }, 300);
                break;
            }
            case 'exit': hideConsole(); break;
            default: appendToConsole(`Unknown command: "${command}". Type 'help' for list.`, true);
        }
    }

    async function runAsciiDiagnostic() {

        diagScreen.classList.add('active');

            outputPre.scrollTop = outputPre.scrollHeight;
        };

        for(let i=0; i<tests.length; i++) {
            appendLine(`[TEST ${i+1}/${tests.length}] ${tests[i]}...`);
            await new Promise(r => setTimeout(r, 300 + Math.random()*180));
            let pass = true, detail = "";
            switch(tests[i]) {
                case "MEMORY CONTROLLER":
                    detail = `TOTAL SLOTS:${TOTAL_SLOTS} CORRUPT SECTORS:${corrupted} HEALTH:${health.toFixed(1)}%`;
                    pass = corrupted < TOTAL_SLOTS * 0.5;
                    break;
                case "FILE SYSTEM INTEGRITY":
                    detail = `MOUNTED FILES:${actualFiles.length} CORRUPTION RATE:${((corrupted/TOTAL_SLOTS)*100).toFixed(1)}%`;
                    pass = corrupted < TOTAL_SLOTS * 0.6;
                    break;
                case "COMM BUS LATENCY": {
                    let lat = (Math.random() * 12 + 1).toFixed(1);
                    detail = `ROUND TRIP TIME: ${lat} ms`;
                    pass = parseFloat(lat) < 15;
                    break;
                }
                case "POWER DISTRIBUTION": {
                    let voltage = (26.0 + Math.random() * 4).toFixed(1);
                    detail = `MAIN BUS: ${voltage} V`;
                    pass = voltage > 24.5 && voltage < 30;
                    break;
                }
                case "RADIATION SENSOR": {
                    let rad = (Math.random() * 5.5).toFixed(2);
                    detail = `FLUX DENSITY: ${rad} uSv/h`;
                    pass = rad < 4.2;
                    break;
                }
                case "NAVIGATION ARRAY": {
                    let lockStatus = Math.random() > 0.2;
                    detail = `STAR TRACKER: ${lockStatus ? "LOCKED" : "DRIFT MODE"}`;
                    pass = lockStatus;
                    break;
                }
            }
            let status = pass ? "[ OK ]" : "[WARN]";
            appendLine(`${status} ${tests[i]}: ${detail}`);
            appendLine("");
        }
        appendLine("=== DIAGNOSTIC COMPLETE ===");
        appendLine(`>>> SYSTEM HEALTH: ${health.toFixed(1)}% (${health > 70 ? "NOMINAL" : "MAINTENANCE RECOMMENDED"})`);
        appendLine(">>> PRESS [EXIT] TO RETURN TO FILE MANAGER");
    }
    
    function closeDiagnostic() {
        const diagScreen = document.getElementById('diag-screen');
        if(diagScreen) {
            diagScreen.classList.remove('active');
            diagActive = false;
            if(bootCompleted && !consoleActive) generatePage(currentPage);
        }
    }
    
    // ---------- BOOT SEQUENCE ----------
    let bootTextEl, bootScreenEl, fileGridEl;
    let bootMsgIndex = 0;
    let bootMessages = [];
    
    function enableSidePanels(enable) {
        const left = document.getElementById('leftSidebar');
        const right = document.getElementById('rightSidebar');
        if(enable) {
            left.classList.remove('boot-disabled');
            right.classList.remove('boot-disabled');
        } else {
            left.classList.add('boot-disabled');
            right.classList.add('boot-disabled');
        }
    }
    
    function buildLongBootMessages() {
        let msgs = [
            ">>> POWER CYCLING <<<",
            "ECMS HARD RESET SEQUENCE INITIATED",
            "KERNEL V0.9.0 LOADING...",
            `BOOT SEED: ${bootSeed.toString().slice(-8)}`,
            "MEMORY CONTROLLER: SELF TEST",
            "SCANNING STORAGE BANKS..."
        ];
        for(let i=0; i<12; i++) {
            let p = 5 + i*7 + (Math.random()*8-4);
            p = Math.min(99, Math.max(5, p));
            const bar = '█'.repeat(Math.floor(p/10)) + '0'.repeat(10-Math.floor(p/10));
            msgs.push(`LOADING MEMORY MAP... [${bar}] ${p.toFixed(1)}%`);
        }
        msgs.push("ESTABLISHING COMMS LINK... ASYNC MODE.");
        msgs.push("MFD INTERFACE READY. STABLE TERMINAL ACTIVE.");
        return msgs;
    }
    
    function playBootStep() {
        if(!bootTextEl) return;
        if(bootMsgIndex < bootMessages.length) {
            bootTextEl.innerHTML += bootMessages[bootMsgIndex] + "<br>";
            bootMsgIndex++;
            setTimeout(playBootStep, 380 + Math.random() * 220);
        } else {
            finalizeBoot();
        }
    }
    
    function finalizeBoot() {
        bootCompleted = true;
        generatePage(1);
        bootScreenEl.classList.add('boot-hidden');
        fileGridEl.classList.add('grid-visible');
        setTimeout(() => { if(bootScreenEl) bootScreenEl.style.display = 'none'; }, 600);
        enableSidePanels(true);
        window.sysNotify("SYSTEM ONLINE. STABLE TERMINAL READY.");
        if(fileSlots[0] && currentGridModules.length) {
            selectedIndex = 0;
            highlightSelection();
        }
    }
    
    function startBoot() {
        if(consoleActive) hideConsole();
        if(diagActive) closeDiagnostic();
        bootSeed = Date.now() + Math.random() * 100000;
        actualFiles = JSON.parse(JSON.stringify(BASE_FILES));
        rebuildFileSlots();
        bootMessages = buildLongBootMessages();
        bootTextEl = document.getElementById('boot-text');
        bootScreenEl = document.getElementById('boot-screen');
        fileGridEl = document.getElementById('file-grid');
        if(bootTextEl) bootTextEl.innerHTML = "";
        bootMsgIndex = 0;
        bootCompleted = false;
        selectedIndex = -1;
        bootScreenEl.style.display = 'flex';
        bootScreenEl.classList.remove('boot-hidden');
        fileGridEl.classList.remove('grid-visible');
        enableSidePanels(false);
        playBootStep();
    }
    
    // ----- MOUNT & AUTO-MOUNT -----
    async function attemptAutoMount() { 
        try { 
            const res = await fetch('mainPage/'); 
            if(res.ok) { 
                const text = await res.text(); 
                const parser = new DOMParser(); 
                const doc = parser.parseFromString(text, 'text/html'); 
                const links = doc.querySelectorAll('a'); 
                const newFiles = []; 
                links.forEach(a => { 
                    let href = a.getAttribute('href'); 
                    if(href && href.endsWith('.html') && href !== '/' && !actualFiles.some(f => f.link === "mainPage/" + href)) { 
                        newFiles.push({ 
                            id: (Math.random()*1e6).toString(16).substr(0,4).toUpperCase(), 
                            title: decodeURIComponent(href).replace('.html', '').replace(/[-_]/g, ' '), 
                            subtitle: "Mounted File", 
                            type: "app", 
                            link: "mainPage/" + href, 
                            utg1: (Math.random()*10).toFixed(2), 
                            utg2: "0.00" 
                        }); 
                    } 
                }); 
                if(newFiles.length) addMountedFiles(newFiles); 
            } 
        } catch(e) { /* ignore */ } 
    }
    
    // ----- EVENT LISTENERS -----
    window.onload = async () => {
        startBoot();
        setTimeout(() => { attemptAutoMount(); }, 2000);
        document.querySelectorAll('.num-btn').forEach(btn => btn.addEventListener('click', () => generatePage(parseInt(btn.getAttribute('data-page')))));
        document.getElementById('pgUpBtn')?.addEventListener('click', () => changePageOffset(1));
        document.getElementById('pgDownBtn')?.addEventListener('click', () => changePageOffset(-1));
        document.getElementById('btn-diag')?.addEventListener('click', () => {
            if(!bootCompleted) { window.sysNotify("SYSTEM BOOTING"); return; }
            if(diagActive) closeDiagnostic();
            else runAsciiDiagnostic();
        });
        document.getElementById('diag-close')?.addEventListener('click', closeDiagnostic);
        document.getElementById('btn-pwr')?.addEventListener('click', () => document.getElementById('power-overlay').classList.add('active'));
        document.getElementById('btn-restart')?.addEventListener('click', () => {
            document.getElementById('power-overlay').classList.remove('active');
            startBoot();
        });
        document.getElementById('btn-sel')?.addEventListener('click', activateSelectedModule);
        document.getElementById('btn-up')?.addEventListener('click', () => moveSelection(0, -1));
        document.getElementById('btn-dwn')?.addEventListener('click', () => moveSelection(0, 1));
        document.getElementById('btn-left')?.addEventListener('click', () => moveSelection(-1, 0));
        document.getElementById('btn-right')?.addEventListener('click', () => moveSelection(1, 0));
        document.getElementById('btn-clear')?.addEventListener('click', clearSelection);
        document.getElementById('btn-cons')?.addEventListener('click', () => {
            if(!bootCompleted) { window.sysNotify("SYSTEM BOOTING"); return; }
            if(consoleActive) hideConsole();
            else showConsole();
        });
        document.getElementById('console-exit-btn')?.addEventListener('click', hideConsole);
        consoleInput?.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                const val = consoleInput.value;
                executeCommand(val);
                consoleInput.value = "";
            } else if(e.key === 'ArrowUp') {
                if(commandHistory.length > 0) {
                    if(historyPos > 0) historyPos--;
                    consoleInput.value = commandHistory[historyPos];
                    setTimeout(() => consoleInput.setSelectionRange(consoleInput.value.length, consoleInput.value.length), 0);
                }
                e.preventDefault();
            } else if(e.key === 'ArrowDown') {
                if(historyPos < commandHistory.length - 1) {
                    historyPos++;
                    consoleInput.value = commandHistory[historyPos];
                } else {
                    historyPos = commandHistory.length;
                    consoleInput.value = "";
                }
                e.preventDefault();
            }
        });
        const dirPicker = document.getElementById('dir-picker');
        document.getElementById('btn-mdir')?.addEventListener('click', () => dirPicker.click());
        dirPicker?.addEventListener('change', (e) => {
            const newFiles = [];
            const files = Array.from(e.target.files);
            for(let file of files) {
                if(file.name.endsWith('.html') && !actualFiles.some(f => f.title === file.name.replace('.html',''))) {
                    const blobUrl = URL.createObjectURL(file);
                    newFiles.push({ 
                        id: (Math.random()*1e6).toString(16).substr(0,4).toUpperCase(), 
                        title: file.name.replace('.html', '').replace(/[-_]/g, ' '), 
                        subtitle: "Local Memory", 
                        type: "app", 
                        link: blobUrl, 
                        utg1: (Math.random()*10).toFixed(2), 
                        utg2: "0.00" 
                    });
                }
            }
            if(newFiles.length) addMountedFiles(newFiles);
        });
        const notifBtns = ['btn-back', 'btn-sys', 'btn-kbrd', 'btn-disp', 'btn-tgt', 'btn-num', 'btn-cycl'];
        notifBtns.forEach(id => { const btn = document.getElementById(id); if(btn) btn.addEventListener('click', () => window.sysNotify('FUNCTION PENDING // ECMS CORE')); });
    };
})();
</script>
